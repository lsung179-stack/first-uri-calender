<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<title>우리 캘린더 · 마케팅 데모</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f3e6cf;--card:#fbf2e0;--text:#3a2418;--sub:#8a6a4d;--mute:#b8a285;
  --border:rgba(139,58,42,.18);--borderL:rgba(139,58,42,.10);
  --accent:#8b3a2a;--aL:#a85040;--aP:#e8d4be;--gold:#b08742;
  --sun:#d4382a;--sat:#1f5b9a;
  --shadow:0 1px 2px rgba(60,40,25,.08),0 8px 24px rgba(60,40,25,.05);
}
body.is-dark{
  --bg:#1a1410;--card:#261d15;--text:#f0e4d0;--sub:#b09578;--mute:#5a4838;
  --border:rgba(240,228,208,.15);--borderL:rgba(240,228,208,.08);
  --accent:#c2a06b;--aL:#d4b07a;--aP:#3a2d22;--gold:#c2a06b;
  --sun:#e6716b;--sat:#7891c4;
  color-scheme:dark;
}
body.is-dark .dp-item,body.is-dark .mp-item{background:var(--aP)!important}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{background:#e5dec7}
html,body{margin:0;padding:0;height:100%;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Pretendard","Apple SD Gothic Neo","Noto Sans KR",sans-serif;-webkit-font-smoothing:antialiased;color-scheme:light only;overflow:hidden;-webkit-user-select:none;user-select:none}
body{background:var(--bg)}

.scr{display:none;height:100%;flex-direction:column}
.scr.show{display:flex}

/* ───── 헤더 ───── */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:max(16px,env(safe-area-inset-top)) 20px 8px;flex-shrink:0;gap:10px}
.cal-back{background:none;border:none;cursor:pointer;padding:6px 10px;font-size:24px;color:var(--text);font-family:inherit;line-height:1;font-weight:300}
.cal-back:active{opacity:.6}
.cal-room-info{flex:1;display:flex;align-items:center;min-width:0;justify-content:center}
.cal-room-name{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.3px;cursor:pointer}
.cal-room-name:active{opacity:.6}
.cal-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;position:relative;z-index:2}
.cal-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--card);cursor:pointer;border:none;font-family:inherit;flex-shrink:0;transition:opacity .15s;overflow:hidden}
.cal-avatar:active{opacity:.7}
.cal-avatar.has-photo{padding:0}
.cal-avatar.has-photo img{width:100%;height:100%;object-fit:cover;display:block}
.icon-btn{width:38px;height:38px;border-radius:50%;background:transparent;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .15s}
.icon-btn:active{background:rgba(139,58,42,.1)}

/* ───── 멤버 탭 ───── */
.cal-member-tabs{display:none;gap:18px;padding:8px 20px 6px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch}
.cal-member-tabs::-webkit-scrollbar{display:none}
.cal-member-tabs.show{display:flex}
.cal-member-tab{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;background:none;border:none;padding:3px;font-family:inherit;transition:opacity .15s}
.cal-member-tab:active{opacity:.6}
.cal-member-tab-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--card);flex-shrink:0;transition:box-shadow .15s;position:relative;overflow:hidden}
.cal-member-tab-icon.has-photo{padding:0}
.cal-member-tab-icon.has-photo img{width:100%;height:100%;object-fit:cover;display:block}
.cal-member-tab.on .cal-member-tab-icon{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
.cal-member-tab-all{background:var(--card);border:1.5px solid var(--border);position:relative}
.cal-member-tab-all-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px;width:18px;height:18px;place-items:center}
.cal-member-tab-all-grid span{width:6px;height:6px;border-radius:50%;display:block}
.cal-member-tab-name{font-size:10px;font-weight:600;color:var(--sub);max-width:60px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-member-tab.on .cal-member-tab-name{color:var(--text)}

/* ───── 월 타이틀 ───── */
.cal-month-row{display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 0 6px;position:relative}
.cal-month-arrow{background:none;border:none;cursor:pointer;font-size:22px;color:var(--sub);font-family:inherit;font-weight:300;padding:6px 10px;line-height:1}
.cal-month-arrow:active{opacity:.5}
.cal-month-title{display:flex;flex-direction:column;align-items:center;cursor:pointer;min-width:90px}
.cal-month-year{font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:2px}
.cal-month-name{font-family:'Noto Serif KR',serif;font-size:24px;font-weight:700;color:var(--text);letter-spacing:.5px;line-height:1.1}
.cal-today-chip{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);background:var(--accent);color:var(--card);border:none;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.3px;flex-shrink:0;z-index:5}
.cal-today-chip.show{display:inline-block}
.cal-today-chip:active{transform:translateY(-50%) scale(.92);opacity:.85}

/* ───── 요일 헤더 ───── */
.cal-week-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));padding:6px 12px 4px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.5px;padding:6px 0}
.cal-dow.sun{color:var(--sun)}
.cal-dow.sat{color:var(--sat)}

/* ───── 캘린더 그리드 ───── */
.cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,minmax(0,1fr));padding:0 12px;gap:0;overflow:hidden;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.cal-cell{min-height:max(90px,calc((100vh - 310px) / 6));padding:2px 0;display:flex;flex-direction:column;cursor:pointer;border-radius:0;transition:background .12s}
.cal-cell:active{background:rgba(139,58,42,.06)}
.cal-cell.other{opacity:.35}
.cal-day-num{text-align:center;font-size:13px;font-weight:500;color:var(--text);margin:2px 0 3px;line-height:20px;font-family:-apple-system,sans-serif;position:relative}
.cal-cell.sun .cal-day-num{color:var(--sun);font-weight:700}
.cal-cell.sat .cal-day-num{color:var(--sat);font-weight:700}
.cal-cell.today .cal-day-num{color:var(--accent);font-weight:700}
.cal-cell.today .cal-day-num::before{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;border:1.5px solid var(--accent);pointer-events:none}
.cal-cell.today .cal-day-num::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:1px solid var(--accent);pointer-events:none}
.cal-cell.holiday .cal-day-num{color:var(--sun);font-weight:700}
.cal-cell-label{font-size:9px;color:var(--sun);text-align:center;font-weight:500;line-height:1.1;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.cal-events{display:flex;flex-direction:column;gap:1px;flex:1;overflow:hidden;padding-bottom:3px}
.cal-evbar{font-size:9px;font-weight:600;padding:2px 4px;margin:0 3px;border-radius:3px;color:#fff;line-height:1.3;min-height:15px;box-sizing:border-box;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cal-evbar.range-start{border-radius:3px 0 0 3px;margin-right:0}
.cal-evbar.range-mid{border-radius:0;margin:0}
.cal-evbar.range-end{border-radius:0 3px 3px 0;margin-left:0}

/* ───── FAB ───── */
.cal-fab{position:fixed;right:24px;bottom:calc(32px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:var(--accent);color:var(--card);border:none;font-size:28px;font-weight:300;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;line-height:1;z-index:20;box-shadow:0 6px 20px rgba(139,58,42,.35)}
.cal-fab:active{transform:scale(.92)}

/* ───── 모달 베이스 ───── */
.mo-overlay{position:fixed;inset:0;background:rgba(60,40,25,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.mo-overlay.on{opacity:1;pointer-events:auto}
.mo-card{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:24px 24px 0 0;padding:14px 24px max(28px,env(safe-area-inset-bottom));z-index:51;transform:translateY(100%);opacity:0;pointer-events:none;transition:transform .3s cubic-bezier(.32,.72,0,1),opacity .25s ease;max-height:80vh;overflow-y:auto}
.mo-card.on{transform:translateY(0);opacity:1;pointer-events:auto}
.mo-handle{width:42px;height:4px;background:var(--mute);border-radius:2px;margin:6px auto 12px;opacity:.6}
.mo-title{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:700;color:var(--text);margin-bottom:14px;text-align:center;letter-spacing:.3px}

/* ───── 일자 시트 ───── */
.dp-head{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;color:var(--text);text-align:center;margin-top:8px}
.dp-sub{font-size:12px;color:var(--sub);text-align:center;margin-top:6px;margin-bottom:18px}
.dp-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;min-height:60px}
.dp-empty{text-align:center;color:var(--sub);font-size:13px;padding:30px 0}
.dp-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#fdf6e8;border:1px solid var(--borderL);border-radius:12px;cursor:pointer}
.dp-item:active{opacity:.7}
.dp-bar{width:4px;height:36px;border-radius:2px;background:var(--accent);flex-shrink:0}
.dp-info{flex:1;min-width:0}
.dp-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-time{font-size:11px;color:var(--sub)}
.dp-mem{font-size:9px;padding:2px 7px;border-radius:6px;color:#fff;font-weight:600;flex-shrink:0;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.2px}
.dp-add{width:100%;padding:14px;background:var(--accent);color:var(--card);border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.3px}
.dp-add:active{opacity:.85}

/* ───── 폼 필드 ───── */
.fi{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--accent)}
.fi::placeholder{color:var(--mute)}
.fi-row{display:flex;gap:8px}
.fi-row .fi{flex:1}
.ev-form{display:flex;flex-direction:column;gap:14px;margin-bottom:8px}
.ev-form-row{display:flex;flex-direction:column;gap:6px}
.ev-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.4px}

/* 모드 토글 */
.mode-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mode-btn{padding:11px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--sub);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.mode-btn.on{background:var(--accent);color:var(--card);border-color:var(--accent)}
.mode-btn:disabled{opacity:.35;pointer-events:none}

/* 색상 grid */
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.color-cell{aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;display:flex;align-items:center;justify-content:center}
.color-cell.on{border-color:var(--text);transform:scale(1.08)}
.color-cell.on::after{content:'✓';color:#fff;font-size:14px;font-weight:bold;text-shadow:0 0 2px rgba(0,0,0,.4)}

/* 멤버 picker */
.mp-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;max-height:280px;overflow-y:auto}
.mp-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:#fdf6e8;border:1px solid var(--borderL);cursor:pointer;transition:background .12s}
.mp-item.on{border-color:var(--accent);background:rgba(139,58,42,.08)}
.mp-item:active{opacity:.7}
.mp-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'Noto Serif KR',serif;font-size:16px;overflow:hidden}
.mp-avatar img{width:100%;height:100%;object-fit:cover}
.mp-name{flex:1;font-size:14px;color:var(--text);font-weight:600}
.mp-check{font-size:18px;color:var(--accent);opacity:0}
.mp-item.on .mp-check{opacity:1}

/* 버튼 row */
.btn{padding:14px;border-radius:12px;border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.3px;transition:opacity .15s}
.btn:active{opacity:.75}
.btn-pr{background:var(--accent);color:var(--card)}
.btn-sc{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-gh{background:rgba(139,58,42,.08);color:var(--text)}
.btn-dn{background:#c44a4a;color:#fff}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-row .btn{flex:1}

/* ───── 멤버 관리 ───── */
.mm-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;max-height:60vh;overflow-y:auto}
.mm-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:#fdf6e8;border:1px solid var(--borderL)}
.mm-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'Noto Serif KR',serif;font-size:17px;overflow:hidden}
.mm-avatar img{width:100%;height:100%;object-fit:cover}
.mm-info{flex:1;min-width:0}
.mm-name{font-size:14px;font-weight:700;color:var(--text)}
.mm-role{font-size:10px;color:var(--accent);font-weight:600;margin-top:2px}
.mm-actions{display:flex;gap:4px}
.mm-act{background:transparent;border:none;color:var(--sub);cursor:pointer;padding:6px 10px;border-radius:8px;font-size:12px;font-family:inherit;font-weight:600}
.mm-act:active{background:rgba(139,58,42,.08)}
.mm-act.del{color:#c44a4a}

/* 아바타 업로더 */
.av-uploader{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:14px}
.av-preview{width:96px;height:96px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--card);font-size:36px;font-family:'Noto Serif KR',serif;font-weight:700;overflow:hidden;cursor:pointer;border:3px solid var(--border)}
.av-preview img{width:100%;height:100%;object-fit:cover}
.av-hint{font-size:11px;color:var(--sub)}

/* 멤버 색상 grid */
.mc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

/* 관리자 메뉴 */
.am-section{font-size:10px;color:var(--sub);font-weight:700;letter-spacing:1.5px;margin:14px 4px 4px}
.am-item{display:flex;align-items:center;gap:10px;padding:14px 16px;border-radius:12px;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:inherit;font-size:14px;color:var(--text);font-weight:600;transition:background .12s}
.am-item:active{background:rgba(139,58,42,.08)}
.am-item.dn{color:#c44a4a}

/* 토스트 */
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.on{opacity:1}

/* 데모 배너 */
.demo-banner{position:fixed;top:0;left:0;right:0;background:var(--accent);color:var(--card);text-align:center;font-size:10px;font-weight:600;padding:3px 12px;z-index:60;letter-spacing:.5px}
.demo-banner-spacer{height:20px;flex-shrink:0}
</style>
</head>
<body class="">

<div class="demo-banner">⚙️ 마케팅 데모 모드 · 데이터는 이 폰에만 저장됨</div>
<div class="demo-banner-spacer"></div>

<!-- 캘린더 화면 -->
<div class="scr show" id="calendarScreen">
  <div class="cal-header">
    <button class="cal-back" onclick="openAdminMenu()" title="설정">≡</button>
    <div class="cal-room-info">
      <div class="cal-room-name" id="calRoomName" onclick="openRoomNameEditor()">우리 가족</div>
    </div>
    <div class="cal-actions">
      <button class="cal-avatar" id="userAvatarBtn" onclick="openMyProfile()" title="내 프로필">나</button>
      <button class="icon-btn" onclick="toggleTheme()" title="테마">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </div>

  <div class="cal-member-tabs" id="calMemberTabs"></div>

  <div class="cal-month-row">
    <button class="cal-month-arrow" onclick="prevMonth()">‹</button>
    <div class="cal-month-title">
      <div class="cal-month-year" id="calYearLabel"></div>
      <div class="cal-month-name" id="calMonthName"></div>
    </div>
    <button class="cal-month-arrow" onclick="nextMonth()">›</button>
    <button class="cal-today-chip" id="todayChip" onclick="goToday()">오늘</button>
  </div>

  <div class="cal-week-head">
    <div class="cal-dow sun">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div><div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div><div class="cal-dow sat">토</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>

  <button class="cal-fab" onclick="openEventNew()" title="새 일정">+</button>
</div>

<!-- 일자 시트 -->
<div class="mo-overlay" id="dpOverlay" onclick="closeDp()"></div>
<div class="mo-card" id="dpCard">
  <div class="mo-handle"></div>
  <div class="dp-head" id="dpDate"></div>
  <div class="dp-sub" id="dpSub"></div>
  <div class="dp-list" id="dpList"></div>
  <button class="dp-add" onclick="openEventNewForSelected()">+ 새 일정 추가</button>
</div>

<!-- 일정 모달 -->
<div class="mo-overlay" id="evOverlay" onclick="closeEvCard()"></div>
<div class="mo-card" id="evCard">
  <div class="mo-handle"></div>
  <div class="mo-title" id="evTitle">새 일정</div>
  <div class="ev-form">
    <div class="ev-form-row">
      <div class="ev-label">제목</div>
      <input class="fi" type="text" id="evTitleInput" placeholder="일정 제목" maxlength="40">
    </div>
    <div class="ev-form-row">
      <div class="ev-label">유형</div>
      <div class="mode-row" id="evModeRow">
        <button class="mode-btn on" data-mode="day" onclick="setEventMode('day')">하루</button>
        <button class="mode-btn" data-mode="range" onclick="setEventMode('range')">기간</button>
      </div>
    </div>
    <div class="ev-form-row" id="dateSingleRow">
      <div class="ev-label">날짜</div>
      <input class="fi" type="date" id="evDate">
    </div>
    <div class="ev-form-row" id="dateRangeRow" style="display:none">
      <div class="ev-label">기간</div>
      <div class="fi-row">
        <input class="fi" type="date" id="evStartDate">
        <input class="fi" type="date" id="evEndDate">
      </div>
    </div>
    <div class="ev-form-row">
      <div class="ev-label">시간 (선택)</div>
      <input class="fi" type="time" id="evTime">
    </div>
    <div class="ev-form-row">
      <div class="ev-label">색상</div>
      <div class="color-grid" id="evColorGrid"></div>
    </div>
    <div class="ev-form-row">
      <div class="ev-label">참여 멤버</div>

<script>
/* ───────────────────────────────────────
 * 우리 캘린더 · 마케팅 데모 페이지
 * localStorage만 사용 (서버 없음)
 * ─────────────────────────────────────── */

const EVENT_COLORS=[
  {key:'red',    hex:'#ea4d4d'},{key:'orange', hex:'#ee9447'},
  {key:'yellow', hex:'#f5d028'},{key:'forest', hex:'#4ea454'},

  {key:'peach',  hex:'#f5b596'},{key:'blush',  hex:'#f5c2d0'},
  {key:'lilac',  hex:'#d5c5e8'},{key:'mint',   hex:'#b5dcc4'},
  {key:'sky',    hex:'#b5cce8'},{key:'butter', hex:'#ffe87a'},
];
const MEMBER_COLORS=[
  {hex:'#8b5a3c'},{hex:'#6b7d3a'},{hex:'#7a8c5a'},{hex:'#c4a04a'},
  {hex:'#a64a3a'},{hex:'#7a4a6a'},{hex:'#3a4a7a'},{hex:'#3a6a4a'},
];
const KOR_HOLIDAYS={
  2025:{'01-01':'신정','03-01':'삼일절','05-05':'어린이날·부처님오신날','05-06':'대체공휴일','06-06':'현충일','08-15':'광복절','10-03':'개천절','10-05':'추석','10-06':'추석','10-07':'추석','10-09':'한글날','12-25':'성탄절'},
  2026:{'01-01':'신정','02-16':'설날','02-17':'설날','02-18':'설날','03-01':'삼일절','03-02':'대체공휴일','05-01':'근로자의날','05-05':'어린이날','05-24':'부처님오신날','05-25':'대체공휴일','06-03':'지방선거','06-06':'현충일','07-17':'제헌절','08-15':'광복절','09-24':'추석','09-25':'추석','09-26':'추석','10-03':'개천절','10-09':'한글날','12-25':'성탄절'},
  2027:{'01-01':'신정','02-06':'설날','02-07':'설날','02-08':'설날','03-01':'삼일절','05-01':'근로자의날','05-05':'어린이날','05-13':'부처님오신날','06-06':'현충일','08-15':'광복절','09-14':'추석','09-15':'추석','09-16':'추석','10-03':'개천절','10-09':'한글날','12-25':'성탄절'},
};

/* 상태 */
let _data={roomName:'우리 가족',members:[],events:[]};
let _calYear=new Date().getFullYear();
let _calMonth=new Date().getMonth();
let _viewingMember='all';
let _selectedDate=null;
let _editingEvent=null;
let _selectedMode='day';
let _selectedColor='blue';
let _selectedMembers=[];
let _editingMember=null;
let _meRole='member';
let _meAvatarData=null;
let _meColorPick=MEMBER_COLORS[0].hex;
let _mpfAvatarData=null;

/* 저장/로드 */
function saveData(){try{localStorage.setItem('admin.data',JSON.stringify(_data))}catch(e){}}
function loadData(){try{const r=localStorage.getItem('admin.data');if(r){_data=JSON.parse(r);return true}}catch(e){}return false}

function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('on'),1800)}

/* 헬퍼 */
function uid(){return 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function pad(n){return String(n).padStart(2,'0')}
function dateKey(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`}
function parseDateKey(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function colorHex(key){const c=EVENT_COLORS.find(x=>x.key===key);return c?c.hex:'#8b3a2a'}
function memberOf(id){return _data.members.find(m=>m.id===id)}
function myMember(){return _data.members.find(m=>m.isMe)}
function daysBetween(s,e){const out=[];const c=parseDateKey(s);const l=parseDateKey(e);while(c<=l){out.push(dateKey(c.getFullYear(),c.getMonth(),c.getDate()));c.setDate(c.getDate()+1)}return out}
function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return (r*299+g*587+b*114)/1000>165}
function _esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

/* 테마 */
function applyTheme(){document.body.classList.toggle('is-dark',localStorage.getItem('admin.dark')==='1')}
function toggleTheme(){const c=localStorage.getItem('admin.dark')==='1';localStorage.setItem('admin.dark',c?'0':'1');applyTheme()}

window.addEventListener('DOMContentLoaded',()=>{
  applyTheme();
  if(!loadData())seedSampleData(false);
  initApp();
});

function initApp(){
  document.getElementById('calRoomName').textContent=_data.roomName;
  renderMemberTabs();renderMonthly();updateMyAvatar();
}

/* ───── 샘플 ───── */
function seedSampleData(force){
  if(force&&!confirm('현재 데이터를 모두 지우고 샘플로 리셋할까요?'))return;
  const t=new Date(),y=t.getFullYear(),m=t.getMonth();
  const me={id:uid(),name:'이원석',color:'#3a4a7a',avatar:null,isMe:true,joined_at:Date.now()};
  const m1={id:uid(),name:'정선주',color:'#a64a3a',avatar:null,isMe:false,joined_at:Date.now()+1};
  const m2={id:uid(),name:'아들',color:'#6b7d3a',avatar:null,isMe:false,joined_at:Date.now()+2};
  _data={
    roomName:'우리 가족',
    members:[me,m1,m2],
    events:[
      {id:uid(),title:'가족식사',date:dateKey(y,m,5),time:'19:00',color:'red',members:[me.id,m1.id,m2.id],shared_id:'s1'},
      {id:uid(),title:'요가',date:dateKey(y,m,7),time:'07:00',color:'sky',members:[m1.id]},
      {id:uid(),title:'한강 데이트',date:dateKey(y,m,8),time:null,color:'mint',members:[me.id,m1.id],shared_id:'s2'},
      {id:uid(),title:'점심 회식',date:dateKey(y,m,10),time:'12:00',color:'orange',members:[me.id]},
      {id:uid(),title:'마라탕',date:dateKey(y,m,10),time:'19:00',color:'forest',members:[me.id,m1.id],shared_id:'s3'},
      {id:uid(),title:'오후 반차',date:dateKey(y,m,10),time:null,color:'sky',members:[me.id]},
      {id:uid(),title:'헬스',date:dateKey(y,m,12),time:'20:00',color:'orange',members:[m1.id]},
      {id:uid(),title:'생일 🎂',date:dateKey(y,m,13),time:null,color:'sky',members:[me.id,m1.id,m2.id],shared_id:'s4'},
      {id:uid(),title:'영화보기',date:dateKey(y,m,18),time:'20:00',color:'mint',members:[me.id,m1.id],shared_id:'s5'},
      {id:uid(),title:'피부과',date:dateKey(y,m,20),time:'14:00',color:'sky',members:[m1.id]},
      {id:uid(),title:'캠핑',date:dateKey(y,m,23),time:null,color:'forest',members:[me.id,m1.id,m2.id],shared_id:'s6'},
      {id:uid(),title:'이사 준비',date:dateKey(y,m,28),time:null,color:'orange',members:[me.id,m1.id],shared_id:'s7'},
    ],
  };
  saveData();
  if(force){initApp();closeAdminMenu();toast('샘플 데이터로 리셋했어요')}
}
function wipeAllData(){
  if(!confirm('정말 모든 데이터를 삭제할까요?'))return;
  _data={roomName:'우리 가족',members:[{id:uid(),name:'나',color:'#3a4a7a',avatar:null,isMe:true,joined_at:Date.now()}],events:[]};
  saveData();initApp();closeAdminMenu();toast('모든 데이터를 삭제했어요');
}

/* ───── 멤버 탭 ───── */
function renderMemberTabs(){
  const wrap=document.getElementById('calMemberTabs');
  if(_data.members.length<2){wrap.classList.remove('show');wrap.innerHTML='';return}
  wrap.classList.add('show');
  const sorted=[..._data.members].sort((a,b)=>{
    if(a.isMe)return -1;if(b.isMe)return 1;
    return (a.joined_at||0)-(b.joined_at||0);
  });
  const allDots=sorted.slice(0,4).map(m=>`<span style="background:${m.color}"></span>`).join('');
  const items=[];
  items.push(`<button class="cal-member-tab ${_viewingMember==='all'?'on':''}" onclick="setViewingMember('all')">
    <div class="cal-member-tab-icon cal-member-tab-all">
      <div class="cal-member-tab-all-grid">${allDots}</div>
    </div>
    <div class="cal-member-tab-name">전체</div>
  </button>`);
  sorted.forEach(m=>{
    const cls=_viewingMember===m.id?'cal-member-tab on':'cal-member-tab';
    const initial=(m.name||'').slice(0,1);
    const inner=m.avatar?`<img src="${m.avatar}">`:initial;
    const photoCls=m.avatar?'has-photo':'';
    items.push(`<button class="${cls}" onclick="setViewingMember('${m.id}')">
      <div class="cal-member-tab-icon ${photoCls}" style="background:${m.color}">${inner}</div>
      <div class="cal-member-tab-name">${_esc(m.name||'')}</div>
    </button>`);
  });
  wrap.innerHTML=items.join('');
}
function setViewingMember(id){_viewingMember=id;renderMemberTabs();renderMonthly()}

/* ───── 캘린더 렌더 ───── */
function renderMonthly(){
  document.getElementById('calYearLabel').textContent=`${_calYear}년`;
  document.getElementById('calMonthName').textContent=`${_calMonth+1}월`;
  const today=new Date();
  const todayKey=dateKey(today.getFullYear(),today.getMonth(),today.getDate());
  const sameMonth=(_calYear===today.getFullYear()&&_calMonth===today.getMonth());
  const tc=document.getElementById('todayChip');
  if(!sameMonth)tc.classList.add('show');else tc.classList.remove('show');

  // 필터
  let evs=_data.events.filter(e=>e.title);
  if(_viewingMember!=='all')evs=evs.filter(e=>(e.members||[]).includes(_viewingMember));

  // shared_id 그룹화로 range 처리
  const grouped={};
  evs.forEach(e=>{const k=e.shared_id||e.id;(grouped[k]=grouped[k]||[]).push(e)});

  const byDate={};
  Object.values(grouped).forEach(group=>{
    const byD={};group.forEach(e=>{byD[e.date]=e});
    const dates=Object.keys(byD).sort();
    dates.forEach((d,i)=>{
      const e={...byD[d]};
      if(dates.length===1)e._rp='single';
      else if(i===0)e._rp='start';
      else if(i===dates.length-1)e._rp='end';
      else e._rp='mid';
      // 토 일 경계 처리
      const dt=parseDateKey(d).getDay();
      if(e._rp==='mid'){
        if(dt===6)e._rp='end';
        else if(dt===0)e._rp='start';
      }else if(e._rp==='start'&&dt===6)e._rp='single';
      else if(e._rp==='end'&&dt===0)e._rp='single';
      (byDate[d]=byDate[d]||[]).push(e);
    });
  });

  // grid
  const first=new Date(_calYear,_calMonth,1);
  const startDow=first.getDay();
  const lastDay=new Date(_calYear,_calMonth+1,0).getDate();
  const prevLastDay=new Date(_calYear,_calMonth,0).getDate();
  const cells=[];
  for(let i=0;i<42;i++){
    const dn=i-startDow+1;
    let y=_calYear,mo=_calMonth,d=dn,other=false;
    if(dn<1){y=_calMonth===0?_calYear-1:_calYear;mo=_calMonth===0?11:_calMonth-1;d=prevLastDay+dn;other=true}
    else if(dn>lastDay){y=_calMonth===11?_calYear+1:_calYear;mo=_calMonth===11?0:_calMonth+1;d=dn-lastDay;other=true}
    const key=dateKey(y,mo,d);
    const dow=i%7;
    const cls=['cal-cell'];
    if(other)cls.push('other');
    if(dow===0)cls.push('sun');
    if(dow===6)cls.push('sat');
    if(key===todayKey)cls.push('today');
    const mdKey=`${pad(mo+1)}-${pad(d)}`;
    const holiday=KOR_HOLIDAYS[y]?.[mdKey];
    if(holiday)cls.push('holiday');
    const dayEvs=(byDate[key]||[]).slice(0,4);
    const evHtml=dayEvs.map(e=>{
      const hex=colorHex(e.color);
      const rangeCls=e._rp==='single'?'':e._rp==='start'?'range-start':e._rp==='mid'?'range-mid':'range-end';
      const txt=(e._rp==='mid'||e._rp==='end')?'&nbsp;':_esc(e.title);
      const txtColor=isLight(hex)?'#3a2418':'#fff';
      return `<div class="cal-evbar ${rangeCls}" style="background:${hex};color:${txtColor}">${txt}</div>`;
    }).join('');
    cells.push(`<div class="${cls.join(' ')}" onclick="openDateSheet('${key}')">
      <div class="cal-day-num">${d}</div>
      ${holiday?`<div class="cal-cell-label">${_esc(holiday)}</div>`:''}
      <div class="cal-events">${evHtml}</div>
    </div>`);
  }
  document.getElementById('calGrid').innerHTML=cells.join('');
}

function prevMonth(){if(--_calMonth<0){_calMonth=11;_calYear--}renderMonthly()}
function nextMonth(){if(++_calMonth>11){_calMonth=0;_calYear++}renderMonthly()}
function goToday(){const t=new Date();_calYear=t.getFullYear();_calMonth=t.getMonth();renderMonthly()}

/* ───── 일자 시트 ───── */
function openDateSheet(key){
  _selectedDate=key;
  const dt=parseDateKey(key);
  const dows=['일','월','화','수','목','금','토'];
  document.getElementById('dpDate').textContent=`${dt.getMonth()+1}월 ${dt.getDate()}일`;
  document.getElementById('dpSub').textContent=`${dows[dt.getDay()]}요일`;
  renderDp();
  document.getElementById('dpOverlay').classList.add('on');
  document.getElementById('dpCard').classList.add('on');
}
function closeDp(){
  document.getElementById('dpOverlay').classList.remove('on');
  document.getElementById('dpCard').classList.remove('on');
}
function renderDp(){
  let evs=_data.events.filter(e=>e.title&&e.date===_selectedDate);
  if(_viewingMember!=='all')evs=evs.filter(e=>(e.members||[]).includes(_viewingMember));
  const seen={};const visible=[];
  evs.forEach(e=>{const k=e.shared_id||e.id;if(!seen[k]){seen[k]=true;visible.push(e)}});
  visible.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const list=document.getElementById('dpList');
  if(!visible.length){list.innerHTML='<div class="dp-empty">아직 등록된 일정이 없어요</div>';return}
  list.innerHTML=visible.map(e=>{
    const hex=colorHex(e.color);
    const ids=e.members||[];
    const isShared=ids.length>1;
    const firstM=memberOf(ids[0]);
    const memLabel=isShared?`함께 ${ids.length}명`:(firstM?firstM.name:'');
    const time=e.time||'종일';
    return `<div class="dp-item" onclick="openEventEdit('${e.id}')">
      <div class="dp-bar" style="background:${hex}"></div>
      <div class="dp-info">
        <div class="dp-title">${_esc(e.title)}</div>
        <div class="dp-time">${time}</div>
      </div>
      ${firstM?`<div class="dp-mem" style="background:${firstM.color}">${_esc(memLabel)}</div>`:''}
    </div>`;
  }).join('');
}
function openEventNewForSelected(){closeDp();setTimeout(()=>openEventNew(_selectedDate),120)}

/* ───── 일정 모달 ───── */
function openEventNew(forDate){
  _editingEvent=null;
  document.getElementById('evTitle').textContent='새 일정';
  document.getElementById('evTitleInput').value='';
  document.getElementById('evTime').value='';
  document.getElementById('evDelBtn').style.display='none';
  _selectedMode='day';_selectedColor='blue';
  const me=myMember();
  _selectedMembers=me?[me.id]:[];
  const today=forDate||dateKey(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  document.getElementById('evDate').value=today;
  document.getElementById('evStartDate').value=today;
  document.getElementById('evEndDate').value=today;
  renderColorGrid();
  setEventMode('day');
  updateMemberCount();
  document.getElementById('evOverlay').classList.add('on');
  document.getElementById('evCard').classList.add('on');
}
function openEventEdit(id){
  const e=_data.events.find(x=>x.id===id);if(!e)return;
  _editingEvent=e;
  document.getElementById('evTitle').textContent='일정 수정';
  document.getElementById('evTitleInput').value=e.title;
  document.getElementById('evTime').value=e.time||'';
  document.getElementById('evDelBtn').style.display='block';
  _selectedColor=e.color||'blue';
  _selectedMembers=[...(e.members||[])];
  let mode='day',rs=e.date,re=e.date;
  if(e.shared_id){
    const group=_data.events.filter(x=>x.shared_id===e.shared_id);
    const dates=[...new Set(group.map(x=>x.date))].sort();
    if(dates.length>1){mode='range';rs=dates[0];re=dates[dates.length-1]}
  }
  _selectedMode=mode;
  document.getElementById('evDate').value=e.date;
  document.getElementById('evStartDate').value=rs;
  document.getElementById('evEndDate').value=re;
  renderColorGrid();
  setEventMode(mode);
  updateMemberCount();
  closeDp();
  setTimeout(()=>{
    document.getElementById('evOverlay').classList.add('on');
    document.getElementById('evCard').classList.add('on');
  },100);
}
function closeEvCard(){
  document.getElementById('evOverlay').classList.remove('on');
  document.getElementById('evCard').classList.remove('on');
}
function setEventMode(mode){
  _selectedMode=mode;
  document.querySelectorAll('#evModeRow .mode-btn').forEach(b=>b.classList.toggle('on',b.dataset.mode===mode));
  document.getElementById('dateSingleRow').style.display=mode==='range'?'none':'block';
  document.getElementById('dateRangeRow').style.display=mode==='range'?'block':'none';
}
function saveEvent(){
  const title=document.getElementById('evTitleInput').value.trim();
  if(!title){toast('제목을 입력해주세요');return}
  if(!_selectedMembers.length){toast('참여 멤버를 선택해주세요');return}
  const time=document.getElementById('evTime').value||null;
  const color=_selectedColor;
  const members=[..._selectedMembers];
  let dates=[];
  if(_selectedMode==='range'){
    const s=document.getElementById('evStartDate').value;
    const e=document.getElementById('evEndDate').value;
    if(!s||!e){toast('기간을 입력해주세요');return}
    if(s>e){toast('시작이 종료보다 늦어요');return}
    dates=daysBetween(s,e);if(dates.length>180){toast('최대 180일');return}
  }else{
    const d=document.getElementById('evDate').value;
    if(!d){toast('날짜를 입력해주세요');return}
    dates=[d];
  }
  if(_editingEvent){
    if(_editingEvent.shared_id)_data.events=_data.events.filter(e=>e.shared_id!==_editingEvent.shared_id);
    else _data.events=_data.events.filter(e=>e.id!==_editingEvent.id);
  }
  const isShared=members.length>=2;
  const sharedId=isShared?uid():null;
  dates.forEach(d=>{
    const ev={id:uid(),title,date:d,time,color,members:[...members]};
    if(isShared)ev.shared_id=sharedId;
    _data.events.push(ev);
  });
  saveData();closeEvCard();renderMonthly();
  if(_selectedDate)renderDp();
  toast(_editingEvent?'일정을 수정했어요':'일정을 추가했어요');
}
function deleteEvent(){
  if(!_editingEvent)return;
  if(!confirm('이 일정을 삭제할까요?'))return;
  if(_editingEvent.shared_id)_data.events=_data.events.filter(e=>e.shared_id!==_editingEvent.shared_id);
  else _data.events=_data.events.filter(e=>e.id!==_editingEvent.id);
  saveData();closeEvCard();renderMonthly();
  if(_selectedDate)renderDp();
  toast('일정을 삭제했어요');
}

/* 색상 grid */
function renderColorGrid(){
  const wrap=document.getElementById('evColorGrid');
  wrap.innerHTML=EVENT_COLORS.map(c=>{
    const cls=c.key===_selectedColor?'color-cell on':'color-cell';
    return `<div class="${cls}" style="background:${c.hex}" data-key="${c.key}"></div>`;
  }).join('');
  wrap.querySelectorAll('.color-cell').forEach(el=>{
    el.onclick=()=>{_selectedColor=el.dataset.key;renderColorGrid()};
  });
}

/* 멤버 picker */
function openMemberPicker(){
  const list=document.getElementById('mpList');
  list.innerHTML=_data.members.map(m=>{
    const on=_selectedMembers.includes(m.id);
    const initial=(m.name||'').slice(0,1);
    const inner=m.avatar?`<img src="${m.avatar}">`:initial;
    return `<div class="mp-item ${on?'on':''}" data-id="${m.id}" onclick="togglePickMember('${m.id}')">
      <div class="mp-avatar" style="background:${m.color}">${inner}</div>
      <div class="mp-name">${_esc(m.name||'')}${m.isMe?' (나)':''}</div>
      <div class="mp-check">✓</div>
    </div>`;
  }).join('');
  document.getElementById('mpOverlay').classList.add('on');
  document.getElementById('mpCard').classList.add('on');
}
function togglePickMember(id){
  const i=_selectedMembers.indexOf(id);
  if(i>=0)_selectedMembers.splice(i,1);else _selectedMembers.push(id);
  document.querySelector(`.mp-item[data-id="${id}"]`)?.classList.toggle('on');
}
function confirmMemberPicker(){
  if(!_selectedMembers.length){toast('최소 1명은 선택해주세요');return}
  closeMemberPicker();updateMemberCount();
}
function closeMemberPicker(){
  document.getElementById('mpOverlay').classList.remove('on');
  document.getElementById('mpCard').classList.remove('on');
}
function updateMemberCount(){document.getElementById('evMemberCount').textContent=_selectedMembers.length}

/* 관리자 */
function openAdminMenu(){
  document.getElementById('adminOverlay').classList.add('on');
  document.getElementById('adminCard').classList.add('on');
}
function closeAdminMenu(){
  document.getElementById('adminOverlay').classList.remove('on');
  document.getElementById('adminCard').classList.remove('on');
}

/* 멤버 관리 */
function openMemberManager(){
  closeAdminMenu();
  setTimeout(()=>{
    renderMemberList();
    document.getElementById('mmOverlay').classList.add('on');
    document.getElementById('mmCard').classList.add('on');
  },150);
}
function closeMemberManager(){
  document.getElementById('mmOverlay').classList.remove('on');
  document.getElementById('mmCard').classList.remove('on');
}
function renderMemberList(){
  const list=document.getElementById('mmList');
  const sorted=[..._data.members].sort((a,b)=>{
    if(a.isMe)return -1;if(b.isMe)return 1;
    return (a.joined_at||0)-(b.joined_at||0);
  });
  list.innerHTML=sorted.map(m=>{
    const initial=(m.name||'').slice(0,1);
    const inner=m.avatar?`<img src="${m.avatar}">`:initial;
    return `<div class="mm-row">
      <div class="mm-avatar" style="background:${m.color}">${inner}</div>
      <div class="mm-info">
        <div class="mm-name">${_esc(m.name||'')}</div>
        <div class="mm-role">${m.isMe?'방장':'멤버'}</div>
      </div>
      <div class="mm-actions">
        <button class="mm-act" onclick="openMemberEdit('${m.id}')">수정</button>
        ${m.isMe?'':`<button class="mm-act del" onclick="quickDeleteMember('${m.id}')">삭제</button>`}
      </div>
    </div>`;
  }).join('');
}
function quickDeleteMember(id){
  const m=memberOf(id);if(!m)return;
  if(!confirm(`${m.name} 멤버를 삭제할까요? (이 멤버의 일정도 함께 삭제됩니다)`))return;
  _data.members=_data.members.filter(x=>x.id!==id);
  _data.events=_data.events.map(e=>{e.members=(e.members||[]).filter(mid=>mid!==id);return e}).filter(e=>e.members.length>0);
  saveData();renderMemberList();renderMemberTabs();renderMonthly();toast('멤버를 삭제했어요');
}
function openMemberEdit(id){
  _editingMember=id?memberOf(id):null;
  const m=_editingMember;
  document.getElementById('meTitle').textContent=m?'멤버 편집':'새 멤버 추가';
  document.getElementById('meName').value=m?.name||'';
  document.getElementById('meDelBtn').style.display=(m&&!m.isMe)?'block':'none';
  _meColorPick=m?.color||MEMBER_COLORS[0].hex;
  _meAvatarData=m?.avatar||null;
  _meRole=m?.isMe?'me':'member';
  setMeRole(_meRole);
  renderMemberColorGrid();
  const av=document.getElementById('meAvatarPreview');
  if(_meAvatarData){av.innerHTML=`<img src="${_meAvatarData}">`}
  else{av.textContent=m?(m.name||'').slice(0,1):'+';av.style.background=_meColorPick}
  closeMemberManager();
  setTimeout(()=>{
    document.getElementById('meOverlay').classList.add('on');
    document.getElementById('meCard').classList.add('on');
  },120);
}
function closeMemberEdit(){
  document.getElementById('meOverlay').classList.remove('on');
  document.getElementById('meCard').classList.remove('on');
  setTimeout(()=>openMemberManager(),200);
}
function setMeRole(role){
  _meRole=role;
  document.querySelectorAll('#meCard .mode-btn').forEach(b=>b.classList.toggle('on',b.dataset.role===role));
}
function renderMemberColorGrid(){
  const wrap=document.getElementById('meColorGrid');
  wrap.innerHTML=MEMBER_COLORS.map(c=>{
    const cls=c.hex===_meColorPick?'color-cell on':'color-cell';
    return `<div class="${cls}" style="background:${c.hex}" data-hex="${c.hex}"></div>`;
  }).join('');
  wrap.querySelectorAll('.color-cell').forEach(el=>{
    el.onclick=()=>{
      _meColorPick=el.dataset.hex;
      renderMemberColorGrid();
      const av=document.getElementById('meAvatarPreview');
      if(!_meAvatarData)av.style.background=_meColorPick;
    };
  });
}
function onMeAvatarFile(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{_meAvatarData=r.result;document.getElementById('meAvatarPreview').innerHTML=`<img src="${_meAvatarData}">`};
  r.readAsDataURL(f);
}
function saveMember(){
  const name=document.getElementById('meName').value.trim();
  if(!name){toast('이름을 입력해주세요');return}
  if(_editingMember){
    _editingMember.name=name;_editingMember.color=_meColorPick;_editingMember.avatar=_meAvatarData;
    if(_meRole==='me'){_data.members.forEach(m=>m.isMe=false);_editingMember.isMe=true}
  }else{
    const m={id:uid(),name,color:_meColorPick,avatar:_meAvatarData,isMe:false,joined_at:Date.now()};
    if(_meRole==='me'){_data.members.forEach(x=>x.isMe=false);m.isMe=true}
    _data.members.push(m);
  }
  saveData();closeMemberEdit();renderMemberTabs();renderMonthly();updateMyAvatar();
  toast(_editingMember?'멤버를 수정했어요':'멤버를 추가했어요');
}
function deleteMember(){
  if(!_editingMember||_editingMember.isMe)return;
  if(!confirm(`${_editingMember.name} 멤버를 삭제할까요?`))return;
  const id=_editingMember.id;
  _data.members=_data.members.filter(x=>x.id!==id);
  _data.events=_data.events.map(e=>{e.members=(e.members||[]).filter(mid=>mid!==id);return e}).filter(e=>e.members.length>0);
  saveData();closeMemberEdit();renderMemberTabs();renderMonthly();
  toast('멤버를 삭제했어요');
}

/* 방 이름 */
function openRoomNameEditor(){
  closeAdminMenu();
  setTimeout(()=>{
    document.getElementById('rnInput').value=_data.roomName;
    document.getElementById('rnOverlay').classList.add('on');
    document.getElementById('rnCard').classList.add('on');
  },120);
}
function closeRoomNameEditor(){
  document.getElementById('rnOverlay').classList.remove('on');
  document.getElementById('rnCard').classList.remove('on');
}
function saveRoomName(){
  const v=document.getElementById('rnInput').value.trim();
  if(!v){toast('방 이름을 입력해주세요');return}
  _data.roomName=v;saveData();
  document.getElementById('calRoomName').textContent=v;
  closeRoomNameEditor();toast('방 이름을 변경했어요');
}

/* 내 프로필 */
function openMyProfile(){
  const me=myMember();if(!me){toast('내가 멤버에 없어요');return}
  _mpfAvatarData=me.avatar;
  document.getElementById('mpfName').value=me.name||'';
  const av=document.getElementById('mpfAvatarPreview');
  if(me.avatar){av.innerHTML=`<img src="${me.avatar}">`}
  else{av.textContent=(me.name||'나').slice(0,1);av.style.background=me.color}
  document.getElementById('mpfOverlay').classList.add('on');
  document.getElementById('mpfCard').classList.add('on');
}
function closeMyProfile(){
  document.getElementById('mpfOverlay').classList.remove('on');
  document.getElementById('mpfCard').classList.remove('on');
}
function onMpfAvatarFile(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{_mpfAvatarData=r.result;document.getElementById('mpfAvatarPreview').innerHTML=`<img src="${_mpfAvatarData}">`};
  r.readAsDataURL(f);
}
function saveMyProfile(){
  const me=myMember();if(!me)return;
  const name=document.getElementById('mpfName').value.trim();
  if(!name){toast('이름을 입력해주세요');return}
  me.name=name;me.avatar=_mpfAvatarData;
  saveData();closeMyProfile();renderMemberTabs();renderMonthly();updateMyAvatar();
  toast('프로필을 변경했어요');
}
function updateMyAvatar(){
  const btn=document.getElementById('userAvatarBtn');
  const me=myMember();
  if(!me){btn.textContent='나';return}
  if(me.avatar){
    btn.classList.add('has-photo');
    btn.innerHTML=`<img src="${me.avatar}">`;
  }else{
    btn.classList.remove('has-photo');
    btn.innerHTML=(me.name||'나').slice(0,1);
    btn.style.background=me.color;
  }
}
</script>
</body>
