<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="only light">
<title>우리 캘린더 · 관리자</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
:root{
  --paper:#f3e6cf; --bg:#f6ecda; --card:#fffdf8; --ink:#3a2418; --accent:#8b3a2a;
  --gold:#b08a50; --sub:#8a6f57; --mute:#c9b89a; --line:rgba(139,58,42,.14);
  --st-pending:#c0392b; --st-paid:#2e7d32; --st-making:#b08a50; --st-shipped:#3d85d4; --st-done:#777; --st-canceled:#aaa;
  --ff-serif:'Noto Serif KR',serif; --ff:'Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ff);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}

#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper)}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 28px;box-shadow:0 8px 30px rgba(139,58,42,.08)}
.login-logo{width:54px;height:54px;border-radius:50%;background:var(--accent);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#f3e6cf;font-family:var(--ff-serif);font-weight:800;font-size:20px}
.login-title{text-align:center;font-family:var(--ff-serif);font-weight:800;font-size:21px;color:var(--accent)}
.login-sub{text-align:center;font-size:13px;color:var(--sub);margin:6px 0 22px}
.login-card label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin:14px 0 6px}
.login-card input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:15px;color:var(--ink)}
.login-card input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;margin-top:22px;padding:13px;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700}
.login-btn:active{transform:scale(.99)}
.login-err{color:var(--st-pending);font-size:13px;text-align:center;margin-top:14px;min-height:18px}

#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--accent);color:#f5ead4}
.topbar .tb-logo{width:34px;height:34px;border-radius:50%;background:#f3e6cf;color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--ff-serif);font-weight:800;font-size:15px;flex-shrink:0}
.topbar .tb-title{font-family:var(--ff-serif);font-weight:700;font-size:17px}
.topbar .tb-spacer{flex:1}
.topbar .tb-user{font-size:12.5px;opacity:.85}
.topbar .tb-logout{font-size:13px;font-weight:700;color:#f5ead4;border:1px solid rgba(245,234,212,.4);padding:6px 12px;border-radius:8px}
.topbar .tb-back{font-size:13px;font-weight:700;color:#f5ead4;border:1px solid rgba(245,234,212,.4);padding:6px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0;background:rgba(245,234,212,.12)}

.shell{display:flex;max-width:1320px;margin:0 auto}
.nav{width:210px;flex-shrink:0;padding:20px 12px;border-right:1px solid var(--line)}
.nav-btn{width:100%;text-align:left;padding:11px 14px;border-radius:10px;font-size:14.5px;font-weight:600;color:var(--sub);display:flex;align-items:center;gap:10px;margin-bottom:4px;position:relative}
.nav-btn:hover{background:var(--card)}
.nav-btn.on{background:var(--accent);color:#fff}
.nav-btn .badge{margin-left:auto;background:var(--st-pending);color:#fff;font-size:11px;font-weight:700;padding:1px 7px;border-radius:10px;min-width:18px;text-align:center}
.nav-btn.on .badge{background:rgba(255,255,255,.25)}

.main{flex:1;min-width:0;padding:24px 22px 70px}
.page-title{font-family:var(--ff-serif);font-weight:800;font-size:22px;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--sub);margin-bottom:20px}
.head-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.head-row .spacer{flex:1}
.btn-line{padding:9px 14px;border-radius:9px;background:var(--card);border:1px solid var(--line);font-size:13.5px;font-weight:700;color:var(--accent)}
.btn-solid{padding:10px 16px;border-radius:9px;background:var(--accent);color:#fff;font-size:14px;font-weight:700}
.search{position:relative}
.search input{width:230px;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:14px}
.search input:focus{outline:none;border-color:var(--accent)}
.search::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px}
.stat-card .sc-label{font-size:13px;color:var(--sub);font-weight:600}
.stat-card .sc-val{font-family:var(--ff-serif);font-weight:800;font-size:30px;color:var(--accent);margin-top:6px;line-height:1}
.stat-card .sc-extra{font-size:12px;color:var(--gold);margin-top:6px;font-weight:600}
.stat-card.alert .sc-val{color:var(--st-pending)}
.chart-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
.chart-title{font-size:14px;font-weight:700;margin-bottom:16px}
.bars{display:flex;align-items:flex-end;gap:6px;height:140px;padding-top:10px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:26px;background:var(--accent);border-radius:5px 5px 0 0;min-height:3px}
.bar-cnt{font-size:11px;font-weight:700;color:var(--accent)}
.bar-day{font-size:10px;color:var(--sub)}

.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch}
.chip{flex-shrink:0;font-size:13px;font-weight:700;padding:7px 13px;border-radius:18px;border:1px solid var(--line);background:#fff;color:var(--sub)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

.table-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:left;padding:12px 14px;background:rgba(139,58,42,.05);color:var(--sub);font-weight:700;font-size:12px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(139,58,42,.025)}
.t-strong{font-weight:700}
.t-dim{color:var(--sub);font-size:12.5px}
.status-badge{display:inline-block;font-size:11.5px;font-weight:700;color:#fff;padding:3px 10px;border-radius:13px;white-space:nowrap}
.mini-btn{font-size:12px;font-weight:700;padding:6px 10px;border-radius:7px;white-space:nowrap;margin:2px 0}
.mb-accent{background:rgba(139,58,42,.1);color:var(--accent)}
.mb-solid{background:var(--accent);color:#fff}
.mb-gray{background:#f0eadf;color:#999}
.mb-del{background:rgba(192,57,43,.1);color:#c0392b}
.row-actions{display:flex;flex-direction:column;gap:5px;min-width:108px}

.clist{display:flex;flex-direction:column;gap:12px}
.ccard{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px}
.ccard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.ccard-date{font-size:11.5px;color:var(--sub);white-space:nowrap}
.ccard-title{font-size:15px;font-weight:700}
.ccard-body{font-size:13.5px;color:var(--ink);line-height:1.5;margin-top:4px;white-space:pre-wrap;word-break:break-word}
.ccard-meta{font-size:12px;color:var(--sub);margin-top:8px;padding-top:8px;border-top:1px solid var(--line);line-height:1.6}
.ccard-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.ccard-actions .mini-btn{flex:1;text-align:center;padding:9px;font-size:13px}

.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty .e-emoji{font-size:34px;margin-bottom:10px}
.loading{text-align:center;padding:50px;color:var(--sub)}

.modal{position:fixed;inset:0;background:rgba(40,28,20,.55);z-index:50;display:none;align-items:center;justify-content:center;padding:20px}
.modal.on{display:flex}
.modal-card{width:100%;max-width:480px;background:var(--card);border-radius:16px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
.modal-head .mt{font-family:var(--ff-serif);font-weight:700;font-size:17px}
.modal-body{padding:18px;overflow-y:auto}
.modal-body label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin:14px 0 6px}
.modal-body label:first-child{margin-top:0}
.modal-body input,.modal-body textarea{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:14.5px;color:var(--ink)}
.modal-body textarea{min-height:120px;resize:vertical;line-height:1.5}
.modal-body input:focus,.modal-body textarea:focus{outline:none;border-color:var(--accent)}
.check-row{display:flex;align-items:center;gap:8px;margin-top:14px}
.check-row input{width:auto}
.modal-foot{padding:14px 18px;border-top:1px solid var(--line);display:flex;gap:10px}
.modal-foot button{flex:1;padding:12px;border-radius:10px;font-size:14.5px;font-weight:700}
.mf-cancel{background:#f0eadf;color:var(--sub)}
.mf-save{background:var(--accent);color:#fff}

/* 구독 탭 — 수동 부여 모달 */
.x-btn{background:none;border:none;font-size:18px;color:var(--sub);cursor:pointer;padding:4px 8px}
.sg-label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin:16px 0 7px}
.sg-label:first-child{margin-top:0}
.sg-results{margin-top:8px;display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.sg-result{display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;text-align:left}
.sg-result:hover{border-color:var(--accent);background:var(--bg)}
.sg-result-name{font-size:14px;font-weight:700;color:var(--ink)}
.sg-result-email{font-size:12px;color:var(--sub)}
.sg-noresult{padding:12px;text-align:center;color:var(--mute);font-size:13px}
.sg-user{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;background:var(--bg);border-radius:12px}
.sg-user-name{font-size:15px;font-weight:700;color:var(--ink)}
.sg-user-email{font-size:12.5px;color:var(--sub);margin-top:2px}
.sg-seg{display:flex;gap:8px}
.sg-seg-btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line);background:#fff;font-size:13.5px;font-weight:700;color:var(--sub);cursor:pointer}
.sg-seg-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sg-presets{display:flex;flex-wrap:wrap;gap:8px}
.sg-preset{padding:9px 16px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:13.5px;font-weight:700;color:var(--sub);cursor:pointer}
.sg-preset.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sg-summary{margin-top:16px;padding:12px 14px;background:rgba(139,58,42,.08);border-radius:10px;font-size:13.5px;font-weight:700;color:var(--accent);text-align:center}
/* 페이지네이션 */
.pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;padding:4px 0}
.pg-btn{padding:8px 16px;border-radius:9px;border:1px solid var(--line);background:var(--card);font-size:13px;font-weight:700;color:var(--accent)}
.pg-btn:disabled{opacity:.4;color:var(--mute);cursor:default}
.pg-info{font-size:13px;font-weight:700;color:var(--ink)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.only-mobile{display:none}
@media(max-width:880px){
  .nav{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;display:flex;padding:6px;border-right:none;border-top:1px solid var(--line);background:var(--card);z-index:25;overflow-x:auto}
  .nav-btn{flex-direction:column;gap:3px;font-size:10.5px;padding:7px 4px;margin-bottom:0;min-width:62px;text-align:center;align-items:center;border-radius:8px}
  .nav-btn .badge{margin-left:0;position:absolute;top:2px;right:8px}
  .main{padding:16px 14px 84px}
  .shell{display:block}
  .table-wrap{display:none}
  .only-mobile{display:flex}
  .only-pc{display:none!important}
  .search input{width:100%}
  .search{flex:1;width:100%}
  .stat-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card .sc-val{font-size:24px}
  /* 모바일 헤더 레이아웃 정리: 이메일은 아랫줄, 제목·버튼은 줄바꿈 금지 */
  .topbar{flex-wrap:wrap;gap:8px 10px;padding:12px 14px}
  .topbar .tb-title{font-size:16px;white-space:nowrap}
  .topbar .tb-back,.topbar .tb-logout{white-space:nowrap;padding:6px 10px;align-self:center}
  .topbar .tb-user{order:9;flex-basis:100%;width:100%;font-size:12px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
}
@media(min-width:881px){ .only-mobile{display:none!important} }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="login-logo">우리</div>
    <div class="login-title">관리자</div>
    <div class="login-sub">우리 캘린더 운영 콘솔</div>
    <label for="email">이메일</label>
    <input id="email" type="email" autocomplete="username" placeholder="관리자 이메일">
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="비밀번호">
    <button class="login-btn" id="loginBtn">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="tb-logo">우리</div>
    <button class="tb-back" id="backBtn">← 캘린더</button>
    <div class="tb-title">관리자 콘솔</div>
    <div class="tb-spacer"></div>
    <span class="tb-user" id="tbUser"></span>
    <button class="tb-logout" id="logoutBtn">로그아웃</button>
  </div>
  <div class="shell">
    <nav class="nav" id="nav"></nav>
    <main class="main" id="main"></main>
  </div>
</div>

<div class="modal" id="annModal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="mt" id="annModalTitle">공지 작성</div>
      <button onclick="closeAnnModal()" style="font-size:18px;color:var(--sub)">✕</button>
    </div>
    <div class="modal-body">
      <label>제목</label>
      <input id="annTitle" placeholder="예: v1.0.1 업데이트 안내" maxlength="80">
      <label>내용</label>
      <textarea id="annBody" placeholder="공지 내용을 입력하세요"></textarea>
      <div class="check-row">
        <input type="checkbox" id="annShowOpen">
        <label for="annShowOpen" style="margin:0;font-weight:600;color:var(--ink)">앱 실행 시 팝업으로 표시</label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="mf-cancel" onclick="closeAnnModal()">취소</button>
      <button class="mf-save" id="annSaveBtn" onclick="saveAnn()">발행하기</button>
    </div>
  </div>
</div>

<!-- 수동 구독 부여 모달 -->
<div class="modal" id="subGrantModal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="mt">🎁 수동 구독 부여</div>
      <button class="x-btn" onclick="closeSubGrant()" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body" id="subGrantBody"></div>
    <div class="modal-foot">
      <button class="mf-cancel" onclick="closeSubGrant()">취소</button>
      <button class="mf-save" id="subGrantSubmit" onclick="submitSubGrant()">구독 부여</button>
    </div>
  </div>
</div>

<!-- 구독 이력 모달 -->
<div class="modal" id="subHistModal">
  <div class="modal-card">
    <div class="modal-head">
      <div class="mt">📜 <span id="subHistName"></span> 님 구독 이력</div>
      <button class="x-btn" onclick="closeSubHist()" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body" id="subHistBody"></div>
    <div class="modal-foot">
      <button class="mf-cancel" onclick="closeSubHist()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncXpra2FzbHFjaGJvdnpya2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMzA5ODMsImV4cCI6MjA5MzYwNjk4M30.UkVo7bugGodTB1hxkQNltFqv1GrMTaNhJ8Lhmo3pIHc';

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),2200);}
function fmtDate(s){if(!s)return '-';const d=new Date(s);const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}
function fmtDay(s){if(!s)return '-';const d=new Date(s);const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`;}
function errBox(e){return `<div class="empty"><div class="e-emoji">⚠️</div>불러오기 실패<br><span style="font-size:12px">${esc(e.message||'')}</span></div>`;}

async function checkSession(){
  // ── 방법 A: 메인 앱(우리 캘린더)에서 넘겨준 세션 토큰이 URL 해시에 있으면 자동 로그인 ──
  // index.html의 openAdminFullPage()가 #at=<access>&rt=<refresh> 형태로 토큰을 실어 보냄.
  // 카카오 로그인이라 admin에서 이메일/비번을 다시 칠 필요가 없도록 세션을 그대로 복원한다.
  try{
    const h = location.hash || '';
    if(h.indexOf('at=')!==-1 && h.indexOf('rt=')!==-1){
      const params = new URLSearchParams(h.replace(/^#/,''));
      const at = params.get('at');
      const rt = params.get('rt');
      // 주소창/히스토리에서 토큰 흔적 즉시 제거 (노출 최소화)
      try{ history.replaceState(null,'',location.pathname+location.search); }catch(_){ location.hash=''; }
      if(at && rt){
        const { data:sd, error:se } = await supa.auth.setSession({ access_token:at, refresh_token:rt });
        if(!se && sd?.user){
          if(sd.user.id===ADMIN_USER_ID){ enterApp(sd.user); return; }
          // 관리자 계정이 아니면 정리 후 로그인 화면
          await supa.auth.signOut(); showLogin('관리자 계정이 아니에요'); return;
        }
      }
    }
  }catch(_){}

  const {data}=await supa.auth.getSession();
  const s=data.session;
  if(s&&s.user&&s.user.id===ADMIN_USER_ID)enterApp(s.user);
  else if(s&&s.user){await supa.auth.signOut();showLogin('관리자 계정이 아니에요');}
  else showLogin('');
}
function showLogin(err){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginErr').textContent=err||'';
}
function enterApp(user){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tbUser').textContent=user.email||'';
  buildNav();
  switchTab('dash');
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const errEl=document.getElementById('loginErr');errEl.textContent='';
  if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력해 주세요';return;}
  document.getElementById('loginBtn').textContent='로그인 중…';
  const {data,error}=await supa.auth.signInWithPassword({email,password:pw});
  document.getElementById('loginBtn').textContent='로그인';
  if(error){errEl.textContent='로그인 실패 — 이메일 또는 비밀번호를 확인해 주세요';return;}
  if(data.user.id!==ADMIN_USER_ID){await supa.auth.signOut();errEl.textContent='관리자 계정이 아니에요';return;}
  enterApp(data.user);
}
document.getElementById('backBtn').onclick=()=>{ try{ location.href='index.html'; }catch(e){ location.href='/'; } };
document.getElementById('logoutBtn').onclick=async()=>{await supa.auth.signOut();showLogin('');};

function buildNav(){
  const nav=document.getElementById('nav');
  nav.innerHTML=TABS.map(t=>`<button class="nav-btn${t.k===_tab?' on':''}" data-k="${t.k}" onclick="switchTab('${t.k}')">
    <span>${t.icon}</span><span>${t.label}</span><span class="badge" id="badge-${t.k}" style="display:none"></span>
  </button>`).join('');
}
function setBadge(k,n){
  const el=document.getElementById('badge-'+k);
  if(!el)return;
  if(n>0){el.textContent=n;el.style.display='';}else el.style.display='none';
}
function switchTab(k){
  _tab=k;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.k===k));
  const m=document.getElementById('main');
  m.innerHTML='<div class="loading">불러오는 중…</div>';
  if(k==='dash')renderDash(m);
  else if(k==='subs')renderSubs(m);
  else if(k==='orders')renderOrders(m);
  else if(k==='announce')renderAnnounce(m);
  else if(k==='users')renderUsers(m);
  else if(k==='errors')renderErrors(m);
  else if(k==='feedback')renderFeedback(m);
}

async function renderDash(m){
  let st;
  try{ const {data,error}=await supa.rpc('admin_dashboard_stats'); if(error)throw error; st=data; }
  catch(e){ m.innerHTML=`<div class="empty"><div class="e-emoji">⚠️</div>통계 로드 실패<br><span style="font-size:12px">${esc(e.message)}</span></div>`; return; }
  setBadge('orders',st.orders_pending);
  setBadge('feedback',st.feedback_new);
  const cards=[
    {l:'전체 회원',v:st.total_users,e:`오늘 +${st.new_users_today} · 최근7일 +${st.new_users_7d}`},
    {l:'전체 방',v:st.total_rooms,e:`등록 일정 ${(st.total_events||0).toLocaleString()}개`},
    {l:'오늘 주문',v:st.orders_today,e:`누적 ${st.total_orders}건`},
    {l:'입금 대기',v:st.orders_pending,e:`${(st.pending_amount||0).toLocaleString()}원`,alert:st.orders_pending>0},
    {l:'오늘 에러',v:st.errors_today,e:'에러 탭에서 확인',alert:st.errors_today>0},
    {l:'새 피드백',v:st.feedback_new,e:'피드백 탭에서 확인',alert:st.feedback_new>0},
  ];
  const daily=st.signups_daily||[];
  const maxc=Math.max(1,...daily.map(d=>d.cnt));
  m.innerHTML=`
    <div class="page-title">대시보드</div>

async function ordDelete(id){

let _subGrantUser=null;     // 수동 부여 대상 {id,name,email}
let _subUnit='day';         // 'day' | 'month'
let _subDays=7;             // 부여 일수

const SUB_SIDE_SIZE=10;     // 수동/만료 페이지 크기
let _subPage=0;             // 전체 구독자 현재 페이지

async function renderSubs(m){
  // 첫 진입 시 페이지 초기화
  _subPage=0;_manualPage=0;_expiredPage=0;
  m.innerHTML='<div class="loading">불러오는 중…</div>';
  // 통계·사유는 한 번만 로드, 나머지는 페이지별 로드
  try{
    const [st,rs]=await Promise.all([
      supa.rpc('admin_subscription_stats'),
      supa.rpc('admin_reason_stats')
    ]);
    if(st.error)throw st.error;
    _subStatsCache=st.data;
    _subReasonsCache=(rs.data&&rs.data.rows)||[];
  }catch(e){ m.innerHTML=errBox(e); return; }
  await drawSubs(m);
}

// 페이지네이션 컨트롤 HTML
function pager(id,page,total,size){
  const pages=Math.max(1,Math.ceil(total/size));
  const cur=page+1;
  if(total<=size)return '';
  return `<div class="pager">
    <button class="pg-btn" ${page<=0?'disabled':''} onclick="${id}(${page-1})">← 이전</button>
    <span class="pg-info">${cur} / ${pages} <span class="t-dim">(${total}명)</span></span>
    <button class="pg-btn" ${cur>=pages?'disabled':''} onclick="${id}(${page+1})">다음 →</button>
  </div>`;
}

async function drawSubs(m){
  const stats=_subStatsCache||{};
  const reasons=_subReasonsCache||[];
  // 세 목록을 병렬 로드
  let manualRes, expiredRes, pageRes;
  try{
    [manualRes,expiredRes,pageRes]=await Promise.all([
      supa.rpc('admin_manual_page',{p_limit:SUB_SIDE_SIZE,p_offset:_manualPage*SUB_SIDE_SIZE}),
      supa.rpc('admin_expired_page',{p_days:30,p_limit:SUB_SIDE_SIZE,p_offset:_expiredPage*SUB_SIDE_SIZE}),
      supa.rpc('admin_subscription_page',{p_filter:_subFilter,p_search:_subSearch,p_limit:SUB_PAGE_SIZE,p_offset:_subPage*SUB_PAGE_SIZE})
    ]);
  }catch(e){ m.innerHTML=errBox(e); return; }
  const manual=(manualRes.data&&manualRes.data.rows)||[];
  const manualTotal=(manualRes.data&&manualRes.data.total)||0;
  const expired=(expiredRes.data&&expiredRes.data.rows)||[];
  const expiredTotal=(expiredRes.data&&expiredRes.data.total)||0;
  const all=(pageRes.data&&pageRes.data.rows)||[];
  const allTotal=(pageRes.data&&pageRes.data.total)||0;

  const cards=[
    {l:'활성 구독자',v:stats.total_active,e:'중복 제거 인원'},
    {l:'월간',v:stats.monthly,e:'monthly 플랜'},
    {l:'연간',v:stats.yearly,e:'yearly 플랜'},
    {l:'수동 부여',v:stats.manual,e:'관리자 지급'},
    {l:'만료 임박',v:stats.expiring_7d,e:'7일 이내',alert:stats.expiring_7d>0},
    {l:'최근 만료',v:expiredTotal,e:'30일 내',alert:expiredTotal>0},
  ];

  m.innerHTML=`
    <div class="page-title">구독 관리</div>
    <div class="page-sub">${fmtDate(new Date().toISOString())} 기준</div>

    <div class="stat-grid">
      ${cards.map(c=>`<div class="stat-card${c.alert?' alert':''}">
        <div class="sc-label">${c.l}</div>
        <div class="sc-val">${c.v==null?'-':c.v}</div>
        <div class="sc-extra">${c.e}</div>
      </div>`).join('')}
    </div>

    <div class="head-row" style="margin-top:18px">
      <button class="btn-line" onclick="openSubGrant()">＋ 수동 구독 부여</button>
      <div class="spacer"></div>
      <button class="btn-line" onclick="exportSubsCsv()">⬇ CSV 내보내기</button>
    </div>

    ${reasons.length?`
    <div class="page-sub" style="margin-top:14px;font-weight:700">📊 부여 사유 통계</div>
    <div class="chips" style="flex-wrap:wrap">
      ${reasons.map(r=>`<span class="chip" style="cursor:default">${esc(r.reason)} <b style="color:var(--accent)">${r.cnt}</b></span>`).join('')}
    </div>`:''}

    <!-- 🎁 수동 구독 멤버 -->
    <div class="page-sub" style="margin-top:18px;font-weight:700;color:var(--accent)">🎁 수동 구독 멤버 (${manualTotal})</div>
    ${!manualTotal?`<div class="empty" style="padding:24px"><div class="e-emoji">🎁</div>수동 부여한 멤버가 없어요</div>`:`
    <div class="clist">${manual.map(r=>subCard(r,true)).join('')}</div>
    ${pager('goManualPage',_manualPage,manualTotal,SUB_SIDE_SIZE)}`}

    <!-- 최근 만료자 -->
    <div class="page-sub" style="margin-top:20px;font-weight:700;color:var(--st-pending)">⏰ 최근 만료자 (${expiredTotal}) · 재구독 유도 대상</div>
    ${!expiredTotal?`<div class="empty" style="padding:24px"><div class="e-emoji">✅</div>최근 30일 내 만료자가 없어요</div>`:`
    <div class="clist">${expired.map(r=>expiredCard(r)).join('')}</div>
    ${pager('goExpiredPage',_expiredPage,expiredTotal,SUB_SIDE_SIZE)}`}

    <!-- 전체 구독자 + 필터 + 검색 -->
    <div class="page-sub" style="margin-top:20px;font-weight:700">전체 구독자 (${allTotal})</div>
    <div class="chips">
      ${[['all','전체'],['yearly','연간'],['monthly','월간'],['manual','수동']
        ].map(([k,l])=>`<button class="chip${k===_subFilter?' on':''}" onclick="subFilter('${k}')">${l}</button>`).join('')}
    </div>
    <div class="head-row"><div class="search" style="flex:1"><input id="subSearch" placeholder="이름·이메일 검색" value="${esc(_subSearch)}"></div></div>
    ${!all.length?`<div class="empty" style="padding:24px"><div class="e-emoji">💳</div>${_subSearch||_subFilter!=='all'?'해당하는 구독자가 없어요':'구독자가 없어요'}</div>`:`
    <div class="clist">${all.map(r=>subCard(r,false)).join('')}</div>
    ${pager('goSubPage',_subPage,allTotal,SUB_PAGE_SIZE)}`}
  `;
  const si=document.getElementById('subSearch');
  if(si)si.oninput=e=>{
    _subSearch=e.target.value.trim();
    _subPage=0; // 검색 시 1페이지로
    clearTimeout(_subSearchPageTm);
    _subSearchPageTm=setTimeout(()=>{
      drawSubs(m).then(()=>{const el=document.getElementById('subSearch');if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}});
    },300);
  };
}
let _subSearchPageTm=null;

// 페이지 이동 함수들
function goSubPage(p){_subPage=Math.max(0,p);drawSubs(document.getElementById('main'));}
function goManualPage(p){_manualPage=Math.max(0,p);drawSubs(document.getElementById('main'));}
function goExpiredPage(p){_expiredPage=Math.max(0,p);drawSubs(document.getElementById('main'));}

function expiredCard(r){
  return `<div class="ccard">
    <div class="ccard-top">
      <span><span class="status-badge" style="background:var(--st-canceled)">만료</span> <span class="ccard-title" style="font-size:14px">${esc(r.name||'(이름 없음)')}</span></span>
      <span class="ccard-date">${r.days_ago}일 전 만료</span>
    </div>
    <div class="ccard-body" style="font-size:13px">${esc(r.email||'-')}</div>
    <div class="ccard-meta">만료일 ${fmtDay(r.expires_at)}${r.is_manual?' · 수동':''}</div>
    <div class="ccard-actions">
      <button class="mini-btn mb-accent" onclick="quickExtend('${r.user_id}','${esc(r.name||'')}')">＋ 재부여</button>
      <button class="mini-btn mb-gray" onclick="showSubHistory('${r.user_id}','${esc(r.name||'')}')">이력</button>
    </div>
  </div>`;
}

function subCard(r,withRevoke){
  const left=r.days_left;
  const urgent=left<=3;
  const planLabel=r.is_manual?'수동':(r.plan_type==='yearly'?'연간':r.plan_type==='monthly'?'월간':r.plan_type);
  const planColor=r.is_manual?'var(--gold)':(r.plan_type==='yearly'?'var(--st-done)':'var(--accent)');
  return `<div class="ccard">
    <div class="ccard-top">
      <span><span class="status-badge" style="background:${planColor}">${planLabel}</span> <span class="ccard-title" style="font-size:14px">${esc(r.name||'(이름 없음)')}</span></span>
      <span class="ccard-date" style="${urgent?'color:var(--st-pending);font-weight:700':''}">D-${left}</span>
    </div>
    <div class="ccard-body" style="font-size:13px">${esc(r.email||'-')}</div>
    <div class="ccard-meta">만료 ${fmtDay(r.expires_at)}${r.manual_reason?' · 사유: '+esc(r.manual_reason):''}</div>
    ${withRevoke?`<div class="ccard-actions">
      <button class="mini-btn mb-accent" onclick="quickExtend('${r.user_id}','${esc(r.name||'')}')">＋연장</button>
      <button class="mini-btn mb-solid" onclick="showSubHistory('${r.user_id}','${esc(r.name||'')}')">이력</button>
      <button class="mini-btn mb-gray" onclick="revokeSub('${r.id}')">회수</button>
    </div>`:`<div class="ccard-actions">
      <button class="mini-btn mb-accent" onclick="showSubHistory('${r.user_id}','${esc(r.name||'')}')">이력 보기</button>
    </div>`}
  </div>`;
}

/* 수동 부여 모달 열기 */
function openSubGrant(preUser){
  _subGrantUser=preUser||null;
  _subUnit='day';_subDays=7;_subExtend=true;
  drawSubGrantModal();
  document.getElementById('subGrantModal').classList.add('on');
}
function closeSubGrant(){
  document.getElementById('subGrantModal').classList.remove('on');
  _subGrantUser=null;
}
function quickExtend(uid,name){ openSubGrant({id:uid,name:name,email:''}); }

const DAY_PRESETS=[1,3,7,14,30];
const MONTH_PRESETS=[1,3,6,12];
function drawSubGrantModal(){
  const body=document.getElementById('subGrantBody');
  const presets=_subUnit==='day'?DAY_PRESETS:MONTH_PRESETS;
  const unitLabel=_subUnit==='day'?'일':'개월';
  body.innerHTML=`
    ${!_subGrantUser?`
      <div class="sg-label">1. 대상 검색</div>
      <input id="subUserSearch" placeholder="이름 또는 이메일 (2글자 이상)" autocomplete="off">
      <div id="subUserResults" class="sg-results"></div>
    `:`
      <div class="sg-user">
        <div>
          <div class="sg-user-name">${esc(_subGrantUser.name||'(이름 없음)')}</div>
          <div class="sg-user-email">${esc(_subGrantUser.email||'')}</div>
        </div>
        <button class="mini-btn mb-gray" onclick="resetSubUser()">변경</button>
      </div>

      <div class="sg-label">2. 기간 단위</div>
      <div class="sg-seg">
        <button class="sg-seg-btn${_subUnit==='day'?' on':''}" onclick="setSubUnit('day')">일 단위</button>
        <button class="sg-seg-btn${_subUnit==='month'?' on':''}" onclick="setSubUnit('month')">월 단위</button>
      </div>

      <div class="sg-label">3. 기간 선택</div>
      <div class="sg-presets">
        ${presets.map(n=>`<button class="sg-preset${_subPresetMatch(n)?' on':''}" onclick="setSubPreset(${n})">${n}${unitLabel}</button>`).join('')}
      </div>
      <input id="subCustomInput" type="number" min="1" placeholder="직접 입력 (${unitLabel})" value="${_subCustomVal()}" oninput="onSubCustom(this.value)" style="margin-top:8px">

      <div class="sg-label">4. 부여 사유 (직접 입력)</div>
      <input id="subReason" placeholder="예) 이벤트 당첨, 버그 보상, 베타 테스터" autocomplete="off">

      <div class="sg-label">5. 기존 구독 처리</div>
      <div class="sg-seg">
        <button class="sg-seg-btn${_subExtend?' on':''}" onclick="setSubExtend(true)">만료일에서 연장</button>
        <button class="sg-seg-btn${!_subExtend?' on':''}" onclick="setSubExtend(false)">지금부터 새로</button>
      </div>

      <div class="sg-summary" id="subSummary">${subSummaryText()}</div>
    `}
  `;
  if(!_subGrantUser){
    const si=document.getElementById('subUserSearch');
    if(si)si.oninput=onSubUserSearch;
  }
}
function _subDaysTotal(){ return _subUnit==='day'?_subDays:_subDays*30; }
function _subPresetMatch(n){ return _subDays===n; }
function _subCustomVal(){
  const presets=_subUnit==='day'?DAY_PRESETS:MONTH_PRESETS;
  return presets.includes(_subDays)?'':_subDays;
}
/* 부여 시 실제 만료 시각 계산 (연장이면 기존 만료일 기준) */
function _subCalcExpiry(){
  const total=_subDaysTotal();
  let base=new Date();
  if(_subExtend && _subGrantUser && _cache.subs){
    // 해당 유저의 활성 구독 중 가장 늦은 만료일 찾기
    const now=Date.now();
    const mine=_cache.subs.filter(r=>r.user_id===_subGrantUser.id && new Date(r.expires_at).getTime()>now);
    if(mine.length){
      const latest=Math.max(...mine.map(r=>new Date(r.expires_at).getTime()));
      base=new Date(latest);
    }
  }
  return new Date(base.getTime()+total*86400*1000);
}
function subSummaryText(){
  const total=_subDaysTotal();
  const expiry=_subCalcExpiry();
  const who=_subGrantUser?esc(_subGrantUser.name||''):'';
  return `${who} · 약 ${total}일 ${_subExtend?'연장':'부여'}<br><span style="font-weight:800;color:var(--accent)">만료: ${fmtDate(expiry.toISOString())}</span>`;
}
function setSubUnit(u){ _subUnit=u; _subDays=(u==='day'?7:1); drawSubGrantModal(); }
function setSubPreset(n){ _subDays=n; drawSubGrantModal(); }
function onSubCustom(v){ const n=parseInt(v,10); if(n>0){_subDays=n; const s=document.getElementById('subSummary'); if(s)s.innerHTML=subSummaryText(); document.querySelectorAll('.sg-preset').forEach(b=>b.classList.remove('on'));} }
function setSubExtend(v){ _subExtend=v; drawSubGrantModal(); }
function resetSubUser(){ _subGrantUser=null; drawSubGrantModal(); }

let _subSearchTm=null;
function onSubUserSearch(e){
  const q=e.target.value.trim();
  clearTimeout(_subSearchTm);
  if(q.length<2){document.getElementById('subUserResults').innerHTML='';return;}
  _subSearchTm=setTimeout(async()=>{
    const {data,error}=await supa.from('profiles').select('id,name,email')
      .or(`name.ilike.%${q}%,email.ilike.%${q}%`).limit(10);
    const box=document.getElementById('subUserResults');
    if(error){box.innerHTML='<div class="sg-noresult">검색 실패</div>';return;}
    if(!data||!data.length){box.innerHTML='<div class="sg-noresult">결과 없음</div>';return;}
    box.innerHTML=data.map(u=>`<button class="sg-result" onclick='pickSubUser(${JSON.stringify(u).replace(/'/g,"&#39;")})'>
      <span class="sg-result-name">${esc(u.name||'(이름 없음)')}</span>
      <span class="sg-result-email">${esc(u.email||'')}</span>
    </button>`).join('');
  },300);
}
function pickSubUser(u){ _subGrantUser=u; drawSubGrantModal(); }

async function submitSubGrant(){
  if(!_subGrantUser){toast('대상을 선택해 주세요');return;}
  const reason=(document.getElementById('subReason')||{}).value||'';
  const days=_subDaysTotal();
  if(!days||days<=0){toast('기간을 입력해 주세요');return;}
  const btn=document.getElementById('subGrantSubmit');
  btn.disabled=true;btn.textContent='부여 중…';
  const {data,error}=await supa.rpc('admin_grant_subscription',{
    p_user_id:_subGrantUser.id, p_days:days, p_reason:reason.trim(), p_extend:_subExtend
  });
  btn.disabled=false;btn.textContent='구독 부여';
  if(error||!data||!data.ok){toast((data&&data.error)||'부여 실패');return;}
  toast('구독을 부여했어요');
  closeSubGrant();
  renderSubs(document.getElementById('main'));
}

async function revokeSub(id){
  if(!confirm('이 수동 구독을 회수할까요? 즉시 만료됩니다.'))return;
  const {data,error}=await supa.rpc('admin_revoke_subscription',{p_sub_id:id});
  if(error||!data||!data.ok){toast('회수 실패');return;}
  toast('회수했어요');
  renderSubs(document.getElementById('main'));
}

/* CSV 내보내기 (현재 필터 기준 전체 조회) */
async function exportSubsCsv(){
  toast('내보내는 중…');
  // 현재 필터·검색 기준 전체를 큰 limit으로 한 번에 조회
  const {data,error}=await supa.rpc('admin_subscription_page',{
    p_filter:_subFilter, p_search:_subSearch, p_limit:100000, p_offset:0
  });
  if(error||!data||!data.ok){toast('내보내기 실패');return;}
  const rows=data.rows||[];
  if(!rows.length){toast('내보낼 구독자가 없어요');return;}
  const head=['이름','이메일','플랜','수동여부','시작일','만료일','남은일수','부여사유'];
  const lines=[head.join(',')];
  rows.forEach(r=>{
    const cell=[
      r.name||'', r.email||'',
      r.is_manual?'수동':(r.plan_type||''),
      r.is_manual?'Y':'N',
      fmtDay(r.started_at), fmtDay(r.expires_at),
      r.days_left, (r.manual_reason||'').replace(/[,\n]/g,' ')
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`);
    lines.push(cell.join(','));
  });
  const csv='\uFEFF'+lines.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`구독자_${_subFilter}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`CSV ${rows.length}건 내보냈어요`);
}

/* 구독 이력 보기 모달 */
async function showSubHistory(userId,name){
  document.getElementById('subHistModal').classList.add('on');
  document.getElementById('subHistName').textContent=name||'(이름 없음)';
  const body=document.getElementById('subHistBody');
  body.innerHTML='<div class="loading">불러오는 중…</div>';
  const {data,error}=await supa.rpc('admin_subscription_history',{p_user_id:userId});
  if(error||!data||!data.ok){body.innerHTML=errBox(error||{message:'권한 오류'});return;}
  const rows=data.rows||[];
  if(!rows.length){body.innerHTML='<div class="empty" style="padding:30px"><div class="e-emoji">📭</div>구독 이력이 없어요</div>';return;}
  const STATUS={active:'활성',expired:'만료',cancelled:'취소'};
  const SCOLOR={active:'var(--st-paid)',expired:'var(--st-canceled)',cancelled:'var(--st-pending)'};
  body.innerHTML=`<div class="clist">${rows.map(r=>{
    const stLabel=r.is_current?'현재 활성':(STATUS[r.status]||r.status);
    const stColor=r.is_current?'var(--st-paid)':(SCOLOR[r.status]||'#777');
    const plan=r.is_manual?'수동':(r.plan_type==='yearly'?'연간':r.plan_type==='monthly'?'월간':r.plan_type);
    return `<div class="ccard" style="${r.is_current?'border-color:var(--st-paid);border-width:2px':''}">
      <div class="ccard-top">
        <span><span class="status-badge" style="background:${stColor}">${stLabel}</span> <span class="t-dim" style="font-size:12px">${plan}</span></span>
        <span class="ccard-date">${fmtDate(r.created_at)}</span>
      </div>
      <div class="ccard-meta" style="border-top:none;padding-top:4px">시작 ${fmtDay(r.started_at)} → 만료 ${fmtDate(r.expires_at)}${r.manual_reason?'<br>사유: '+esc(r.manual_reason):''}</div>
    </div>`;
  }).join('')}</div>`;
}
function closeSubHist(){document.getElementById('subHistModal').classList.remove('on');}
function subFilter(k){_subFilter=k;_subPage=0;drawSubs(document.getElementById('main'));}

applyBrandLogos();
checkSession();
</script>
