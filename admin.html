<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="only light">
<title>우리 캘린더 · 주문 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
:root{
  --paper:#f3e6cf; --card:#fffdf8; --ink:#3a2418; --accent:#8b3a2a;
  --gold:#b08a50; --sub:#8a6f57; --mute:#c9b89a; --line:rgba(139,58,42,.14);
  --ff-serif:'Noto Serif KR',serif; --ff:'Noto Sans KR',sans-serif;
  --st-pending:#c0392b; --st-paid:#2e7d32; --st-making:#b08a50; --st-shipped:#3d85d4; --st-done:#777; --st-canceled:#aaa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--ff);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit}

/* ───── 로그인 ───── */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--paper)}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 28px;box-shadow:0 8px 30px rgba(139,58,42,.08)}
.login-logo{width:54px;height:54px;border-radius:50%;background:var(--accent);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#f3e6cf;font-family:var(--ff-serif);font-weight:800;font-size:20px}
.login-title{text-align:center;font-family:var(--ff-serif);font-weight:800;font-size:21px;color:var(--accent)}
.login-sub{text-align:center;font-size:13px;color:var(--sub);margin:6px 0 22px}
.login-card label{display:block;font-size:12.5px;font-weight:700;color:var(--sub);margin:14px 0 6px}
.login-card input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:15px;color:var(--ink)}
.login-card input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;margin-top:22px;padding:13px;border-radius:11px;background:var(--accent);color:#fff;font-size:15px;font-weight:700}
.login-btn:active{transform:scale(.99)}
.login-err{color:var(--st-pending);font-size:13px;text-align:center;margin-top:14px;min-height:18px}

/* ───── 앱 셸 ───── */
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--accent);color:#f5ead4}
.topbar .tb-logo{width:34px;height:34px;border-radius:50%;background:#f3e6cf;color:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--ff-serif);font-weight:800;font-size:15px;flex-shrink:0}
.topbar .tb-title{font-family:var(--ff-serif);font-weight:700;font-size:17px}
.topbar .tb-spacer{flex:1}
.topbar .tb-user{font-size:12.5px;opacity:.85}
.topbar .tb-logout{font-size:13px;font-weight:700;color:#f5ead4;border:1px solid rgba(245,234,212,.4);padding:6px 12px;border-radius:8px}

.shell{display:flex;max-width:1280px;margin:0 auto}

/* 사이드바 (PC) */
.side{width:240px;flex-shrink:0;padding:24px 16px;border-right:1px solid var(--line)}
.side-sec{font-size:11px;font-weight:700;color:var(--mute);letter-spacing:.5px;text-transform:uppercase;margin:18px 8px 8px}
.side-sec:first-child{margin-top:0}
.side-stat{display:flex;justify-content:space-between;align-items:baseline;padding:10px 12px;border-radius:10px;background:var(--card);border:1px solid var(--line);margin-bottom:8px}
.side-stat .ss-label{font-size:13px;color:var(--sub)}
.side-stat .ss-val{font-family:var(--ff-serif);font-weight:800;font-size:20px;color:var(--accent)}
.side-filter{display:flex;flex-direction:column;gap:4px}
.side-fbtn{text-align:left;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:600;color:var(--sub);display:flex;justify-content:space-between;align-items:center}
.side-fbtn:hover{background:var(--card)}
.side-fbtn.on{background:var(--accent);color:#fff}
.side-fbtn .cnt{font-size:12px;opacity:.8}

/* 메인 */
.main{flex:1;min-width:0;padding:24px 20px 60px}
.main-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.main-title{font-family:var(--ff-serif);font-weight:800;font-size:22px;color:var(--ink)}
.main-head .mh-spacer{flex:1}
.search{position:relative}
.search input{width:230px;padding:9px 12px 9px 34px;border:1px solid var(--line);border-radius:9px;background:#fff;font-size:14px}
.search input:focus{outline:none;border-color:var(--accent)}
.search::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}
.refresh{padding:9px 14px;border-radius:9px;background:var(--card);border:1px solid var(--line);font-size:13.5px;font-weight:700;color:var(--accent)}

/* 모바일 필터칩 (PC 숨김) */
.mob-filter{display:none;gap:7px;overflow-x:auto;padding:0 0 14px;-webkit-overflow-scrolling:touch}
.mob-fbtn{flex-shrink:0;font-size:13px;font-weight:700;padding:7px 13px;border-radius:18px;border:1px solid var(--line);background:#fff;color:var(--sub)}
.mob-fbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* 테이블 (PC) */
.table-wrap{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{text-align:left;padding:13px 14px;background:rgba(139,58,42,.05);color:var(--sub);font-weight:700;font-size:12px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(139,58,42,.025)}
.t-name{font-weight:700;font-size:14px}
.t-phone{color:var(--sub);font-size:12.5px;margin-top:2px}
.t-addr{font-size:12.5px;color:var(--ink);max-width:240px;line-height:1.45}
.t-memo{font-size:11.5px;color:var(--sub);margin-top:3px}
.t-meta{font-size:12px;color:var(--sub);line-height:1.6}
.t-date{font-size:12px;color:var(--sub);white-space:nowrap}
.status-badge{display:inline-block;font-size:11.5px;font-weight:700;color:#fff;padding:3px 10px;border-radius:13px;white-space:nowrap}
.row-actions{display:flex;flex-direction:column;gap:6px;min-width:120px}
.ra-btn{font-size:12px;font-weight:700;padding:6px 10px;border-radius:7px;white-space:nowrap;text-align:center}
.ra-pdf{background:rgba(139,58,42,.1);color:var(--accent)}
.ra-next{background:var(--accent);color:#fff}
.ra-cancel{background:#f0eadf;color:#999}
.ra-nopdf{font-size:11px;color:var(--mute);text-align:center;padding:4px}

/* 카드 (모바일) */
.cards{display:none;flex-direction:column;gap:12px}
.ocard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
.ocard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.ocard-date{font-size:11.5px;color:var(--sub)}
.ocard-name{font-size:16px;font-weight:700}
.ocard-phone{font-size:13px;color:var(--sub);font-weight:500;margin-left:6px}
.ocard-addr{font-size:13.5px;margin-top:5px;line-height:1.5}
.ocard-memo{font-size:12.5px;color:var(--sub);margin-top:4px}
.ocard-meta{font-size:12px;color:var(--sub);margin-top:9px;padding-top:9px;border-top:1px solid var(--line);line-height:1.6}
.ocard-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.ocard-actions .ra-btn{flex:1;padding:9px;font-size:13px}

.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty .e-emoji{font-size:34px;margin-bottom:10px}
.loading{text-align:center;padding:60px;color:var(--sub)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;opacity:0;transition:.25s;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.2)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ───── 반응형 ───── */
@media(max-width:860px){
  .side{display:none}
  .table-wrap{display:none}
  .cards{display:flex}
  .mob-filter{display:flex}
  .main{padding:16px 14px 60px}
  .main-head{flex-wrap:wrap}
  .main-title{font-size:19px}
  .search input{width:100%}
  .search{flex:1;order:3;width:100%}
  .mh-spacer{display:none}
}
@media(min-width:861px){
  .mob-filter{display:none!important}
  .cards{display:none!important}
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login">
  <div class="login-card">
    <div class="login-logo">우리</div>
    <div class="login-title">주문 관리</div>
    <div class="login-sub">관리자 전용 페이지입니다</div>
    <label for="email">이메일</label>
    <input id="email" type="email" autocomplete="username" placeholder="관리자 이메일">
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" autocomplete="current-password" placeholder="비밀번호">
    <button class="login-btn" id="loginBtn">로그인</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">우리</div>
    <div class="tb-title">달력 주문 관리</div>
    <div class="tb-spacer"></div>
    <span class="tb-user" id="tbUser"></span>
    <button class="tb-logout" id="logoutBtn">로그아웃</button>
  </div>

  <div class="shell">
    <!-- 사이드바 (PC) -->
    <aside class="side">
      <div class="side-sec">현황</div>
      <div class="side-stat"><span class="ss-label">전체 주문</span><span class="ss-val" id="statTotal">0</span></div>
      <div class="side-stat"><span class="ss-label">입금 대기</span><span class="ss-val" id="statPending">0</span></div>
      <div class="side-stat"><span class="ss-label">진행 중</span><span class="ss-val" id="statActive">0</span></div>
      <div class="side-sec">상태별 보기</div>
      <div class="side-filter" id="sideFilter"></div>
    </aside>

    <!-- 메인 -->
    <main class="main">
      <div class="main-head">
        <div class="main-title" id="mainTitle">전체 주문</div>
        <div class="mh-spacer"></div>
        <div class="search"><input id="searchInput" placeholder="이름·연락처 검색"></div>
        <button class="refresh" id="refreshBtn">새로고침</button>
      </div>
      <div class="mob-filter" id="mobFilter"></div>
      <div id="listArea">
        <div class="loading">불러오는 중…</div>
      </div>
    </main>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL='https://bgqzkkaslqchbovzrkao.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJncXpra2FzbHFjaGJvdnpya2FvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMzA5ODMsImV4cCI6MjA5MzYwNjk4M30.UkVo7bugGodTB1hxkQNltFqv1GrMTaNhJ8Lhmo3pIHc';
const ADMIN_USER_ID='3bc13a8b-618d-4d47-abea-1eec4d682ec0';
const supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const STATUS={pending:'입금대기',paid:'입금확인',making:'제작중',shipped:'배송중',done:'완료',canceled:'취소'};
const STATUS_COLOR={pending:'var(--st-pending)',paid:'var(--st-paid)',making:'var(--st-making)',shipped:'var(--st-shipped)',done:'var(--st-done)',canceled:'var(--st-canceled)'};
const FLOW=['pending','paid','making','shipped','done'];
const FILTERS=[['all','전체'],['pending','입금대기'],['paid','입금확인'],['making','제작중'],['shipped','배송중'],['done','완료'],['canceled','취소']];

let _orders=[], _filter='all', _search='';

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tm);t._tm=setTimeout(()=>t.classList.remove('show'),2200);}
function fmtDate(s){const d=new Date(s);const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}

/* ── 로그인 ── */
async function checkSession(){
  const {data}=await supa.auth.getSession();
  const s=data.session;
  if(s&&s.user&&s.user.id===ADMIN_USER_ID){ enterApp(s.user); }
  else if(s&&s.user){ await supa.auth.signOut(); showLogin('관리자 계정이 아니에요'); }
  else showLogin('');
}
function showLogin(err){
  document.getElementById('login').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginErr').textContent=err||'';
}
function enterApp(user){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('tbUser').textContent=user.email||'';
  buildFilters();
  loadOrders();
}
document.getElementById('loginBtn').onclick=doLogin;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const errEl=document.getElementById('loginErr');
  errEl.textContent='';
  if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력해 주세요';return;}
  document.getElementById('loginBtn').textContent='로그인 중…';
  const {data,error}=await supa.auth.signInWithPassword({email,password:pw});
  document.getElementById('loginBtn').textContent='로그인';
  if(error){errEl.textContent='로그인 실패 — 이메일 또는 비밀번호를 확인해 주세요';return;}
  if(data.user.id!==ADMIN_USER_ID){ await supa.auth.signOut(); errEl.textContent='관리자 계정이 아니에요'; return; }
  enterApp(data.user);
}
document.getElementById('logoutBtn').onclick=async()=>{ await supa.auth.signOut(); showLogin(''); };

/* ── 필터 UI ── */
function buildFilters(){
  const side=document.getElementById('sideFilter');
  const mob=document.getElementById('mobFilter');
  side.innerHTML=FILTERS.map(([k,l])=>`<button class="side-fbtn${k===_filter?' on':''}" data-f="${k}"><span>${l}</span><span class="cnt" id="sc-${k}"></span></button>`).join('');
  mob.innerHTML=FILTERS.map(([k,l])=>`<button class="mob-fbtn${k===_filter?' on':''}" data-f="${k}">${l}</button>`).join('');
  side.querySelectorAll('.side-fbtn').forEach(b=>b.onclick=()=>setFilter(b.dataset.f));
  mob.querySelectorAll('.mob-fbtn').forEach(b=>b.onclick=()=>setFilter(b.dataset.f));
}
function setFilter(f){
  _filter=f;
  document.querySelectorAll('.side-fbtn').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  document.querySelectorAll('.mob-fbtn').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
  document.getElementById('mainTitle').textContent=(FILTERS.find(x=>x[0]===f)||['','전체'])[1]+' 주문';
  render();
}
document.getElementById('searchInput').addEventListener('input',e=>{_search=e.target.value.trim().toLowerCase();render();});
document.getElementById('refreshBtn').onclick=loadOrders;

/* ── 데이터 ── */
async function loadOrders(){
  document.getElementById('listArea').innerHTML='<div class="loading">불러오는 중…</div>';
  const {data,error}=await supa.from('calendar_orders').select('*').order('created_at',{ascending:false});
  if(error){ document.getElementById('listArea').innerHTML=`<div class="empty"><div class="e-emoji">⚠️</div>불러오기 실패<br><span style="font-size:12px">${esc(error.message)}</span></div>`; return; }
  _orders=data||[];
  updateStats();
  render();
}
function updateStats(){
  document.getElementById('statTotal').textContent=_orders.length;
  document.getElementById('statPending').textContent=_orders.filter(o=>o.status==='pending').length;
  document.getElementById('statActive').textContent=_orders.filter(o=>['paid','making','shipped'].includes(o.status)).length;
  FILTERS.forEach(([k])=>{
    const el=document.getElementById('sc-'+k);
    if(el)el.textContent=k==='all'?_orders.length:_orders.filter(o=>o.status===k).length;
  });
}
function filtered(){
  let list=_filter==='all'?_orders:_orders.filter(o=>o.status===_filter);
  if(_search)list=list.filter(o=>(o.recipient_name||'').toLowerCase().includes(_search)||(o.phone||'').toLowerCase().includes(_search));
  return list;
}

/* ── 렌더 ── */
function render(){
  const list=filtered();
  const area=document.getElementById('listArea');
  if(!list.length){ area.innerHTML=`<div class="empty"><div class="e-emoji">📭</div>${_search?'검색 결과가 없어요':'주문이 없어요'}</div>`; return; }
  area.innerHTML=tableHTML(list)+cardsHTML(list);
}
function statusBadge(st){return `<span class="status-badge" style="background:${STATUS_COLOR[st]||'#777'}">${STATUS[st]||st}</span>`;}
function nextBtn(o){
  const i=FLOW.indexOf(o.status);
  if(i>=0&&i<FLOW.length-1)return `<button class="ra-btn ra-next" onclick="setStatus('${o.id}','${FLOW[i+1]}')">→ ${STATUS[FLOW[i+1]]}</button>`;
  return '';
}
function cancelBtn(o){
  if(o.status!=='canceled'&&o.status!=='done')return `<button class="ra-btn ra-cancel" onclick="setStatus('${o.id}','canceled')">취소</button>`;
  return '';
}
function pdfBtn(o){
  return o.pdf_path?`<button class="ra-btn ra-pdf" onclick="downloadPdf('${o.id}')">📄 PDF</button>`:'<span class="ra-nopdf">PDF 없음</span>';
}
function tableHTML(list){
  return `<div class="table-wrap"><table>
    <thead><tr><th>상태</th><th>주문자</th><th>배송지</th><th>주문 내역</th><th>주문 시각</th><th>처리</th></tr></thead>
    <tbody>${list.map(o=>`
      <tr>
        <td>${statusBadge(o.status)}</td>
        <td><div class="t-name">${esc(o.recipient_name)}</div><div class="t-phone">${esc(o.phone)}</div></td>
        <td><div class="t-addr">${esc(o.address)}</div>${o.memo?`<div class="t-memo">요청: ${esc(o.memo)}</div>`:''}</td>
        <td><div class="t-meta">${o.cal_year}년 · ${esc(o.cover_name||o.cover_key)}<br>일정 ${o.event_count}개 · ${(o.price||0).toLocaleString()}원${o.room_name?'<br>'+esc(o.room_name):''}</div></td>
        <td><div class="t-date">${fmtDate(o.created_at)}</div></td>
        <td><div class="row-actions">${pdfBtn(o)}${nextBtn(o)}${cancelBtn(o)}</div></td>
      </tr>`).join('')}
    </tbody></table></div>`;
}
function cardsHTML(list){
  return `<div class="cards">${list.map(o=>`
    <div class="ocard">
      <div class="ocard-top">${statusBadge(o.status)}<span class="ocard-date">${fmtDate(o.created_at)}</span></div>
      <div><span class="ocard-name">${esc(o.recipient_name)}</span><span class="ocard-phone">${esc(o.phone)}</span></div>
      <div class="ocard-addr">${esc(o.address)}</div>
      ${o.memo?`<div class="ocard-memo">요청: ${esc(o.memo)}</div>`:''}
      <div class="ocard-meta">${o.cal_year}년 · ${esc(o.cover_name||o.cover_key)} · 일정 ${o.event_count}개 · ${(o.price||0).toLocaleString()}원${o.room_name?' · '+esc(o.room_name):''}</div>
      <div class="ocard-actions">${pdfBtn(o)}${nextBtn(o)}${cancelBtn(o)}</div>
    </div>`).join('')}</div>`;
}

/* ── 액션 ── */
async function setStatus(id,st){
  const {error}=await supa.from('calendar_orders').update({status:st}).eq('id',id);
  if(error){toast('변경 실패');return;}
  const o=_orders.find(x=>x.id===id); if(o)o.status=st;
  updateStats(); render(); toast('상태 변경: '+(STATUS[st]||st));
}
async function downloadPdf(id){
  const o=_orders.find(x=>x.id===id); if(!o||!o.pdf_path){toast('PDF 경로 없음');return;}
  const {data,error}=await supa.storage.from('calendar-pdfs').createSignedUrl(o.pdf_path,600);
  if(error){toast('PDF 열기 실패');return;}
  window.open(data.signedUrl,'_blank');
}
