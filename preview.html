<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="only light">
<title>우리 캘린더 — 미리보기 테스트</title>
<script src="https://unpkg.com/lunar-javascript@1.6.13/lunar.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap');
:root{--ff-serif:'Noto Serif KR',serif;--accent:#8b3a2a}
*{box-sizing:border-box}
html,body{margin:0;background:#d9c8aa;font-family:'Noto Sans KR',sans-serif;color:#3d2a21}
.wrap{max-width:760px;margin:0 auto;padding:20px 12px 60px}
h1{font-family:var(--ff-serif);font-size:22px;text-align:center;color:var(--accent);margin:6px 0 2px}
.sub{text-align:center;font-size:13px;color:#7a5c48;margin-bottom:18px}
.ctrl{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:18px;position:sticky;top:0;background:#d9c8aaee;padding:10px;border-radius:12px;backdrop-filter:blur(4px);z-index:5}
.ctrl button{background:#fff;border:1px solid rgba(139,58,42,.25);color:var(--accent);font-weight:700;font-size:14px;padding:8px 14px;border-radius:9px;cursor:pointer;font-family:inherit}
.ctrl button.on{background:var(--accent);color:#fff}
.ctrl .seg{display:flex;gap:6px}
.cal{margin:0 auto 26px;display:flex;justify-content:center}
.lbl{text-align:center;font-size:13px;font-weight:700;color:#7a5c48;margin-bottom:6px}
.note{font-size:12px;color:#7a5c48;text-align:center;line-height:1.6;margin-top:24px;padding:0 16px}
</style></head>
<body><div class="wrap">
<h1>우리 캘린더 미리보기</h1>
<div class="sub">실제 인쇄 비율 그대로 · 모든 달 확인용 테스트 페이지</div>
<div class="ctrl">
  <button id="prevM">‹ 이전달</button>
  <div class="lbl" id="mLbl" style="min-width:80px;margin:0">1월</div>
  <button id="nextM">다음달 ›</button>
  <div class="seg" style="margin-left:10px">
    <button id="sideFront" class="on">앞면</button>
    <button id="sideBack">뒷면</button>
  </div>
</div>
<div class="lbl" id="yLbl"></div>
<div class="cal" id="cal"></div>
<div class="note">
  ※ 이 페이지는 디자인 확인용 테스트입니다. 실제 앱에는 사용자가 고른 일정이 들어갑니다.<br>
  더미 일정: 6월에 휴무·피티·속눈썹펌·치과, 제주도(5~6일 기간), 여행(25~27일 기간)이 들어가 있어요.
</div>
</div>
<script>
const CO_MONTH_EN = ['','JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

const CO_MONTH_KR = ['','일월','이월','삼월','사월','오월','유월','칠월','팔월','구월','시월','십일월','십이월'];

const CO_HOLIDAYS = {
  '1-1':'신정','2-6':'설날 연휴','2-7':'설날','2-8':'설날 연휴','2-9':'대체공휴일',
  '3-1':'삼일절','5-1':'근로자의 날','5-5':'어린이날','5-13':'부처님오신날','6-6':'현충일',
  '7-17':'제헌절','7-19':'대체공휴일','8-15':'광복절','8-16':'대체공휴일',
  '9-14':'추석 연휴','9-15':'추석','9-16':'추석 연휴',
  '10-3':'개천절','10-4':'대체공휴일','10-9':'한글날','10-11':'대체공휴일',
  '12-25':'성탄절','12-27':'대체공휴일'
};

const CO_QUOTES = {
  1:'같은 달력을 보는 것만으로도\n우리는 조금 더 가까워진다',2:'함께 보낸 평범한 하루가\n가장 특별한 기념일이 된다',
  3:'봄이 오는 길목에서\n우리의 계획도 피어난다',4:'흩날리는 벚꽃처럼\n우리의 날들도 반짝인다',
  5:'고마운 사람들과 보내는 5월,\n달력이 제일 바쁜 달',6:'한 해의 절반,\n우리는 잘 걸어가고 있다',
  7:'뜨거운 여름,\n우리의 여행은 이제 시작',8:'쉼표 같은 휴가도\n함께라서 문장이 된다',
  9:'둥근 보름달처럼\n우리의 마음도 가득 차오른다',10:'하늘이 높아지는 계절,\n우리의 기록도 깊어진다',
  11:'한 장 남은 달력이\n아쉽지 않도록 오늘을 살자',12:'올해의 마지막 장,\n내년에도 함께 넘기자'
};


// 더미 일정 (기간 연결/순서/공휴일 겹침 확인용)
const _coSelectedEvents={
  e1:{title:'휴무',color:'c-vintage',startYmd:'2027-06-01',endYmd:'2027-06-01'},
  e2:{title:'2 피티',color:'c-sky',startYmd:'2027-06-01',endYmd:'2027-06-01'},
  e3:{title:'4 속눈썹펌',color:'c-sky',startYmd:'2027-06-01',endYmd:'2027-06-01'},
  e4:{title:'11.5 치과',color:'c-sky',startYmd:'2027-06-04',endYmd:'2027-06-04'},
  e5:{title:'3 피티',color:'c-sky',startYmd:'2027-06-04',endYmd:'2027-06-04'},
  e6:{title:'제주도',color:'c-plum',startYmd:'2027-06-05',endYmd:'2027-06-06'},
  e7:{title:'여행',color:'c-forest',startYmd:'2027-06-25',endYmd:'2027-06-27'},
  e8:{title:'생일',color:'c-vintage',startYmd:'2027-06-13',endYmd:'2027-06-13',yearly:true},
};
let _coYear=2027;

function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function coYmd(y,m,d){return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function coParseYmd(s){return {y:+s.slice(0,4),m:+s.slice(5,7),d:+s.slice(8,10)};}
function coAddDay(ymd,delta){const p=coParseYmd(ymd);const dt=new Date(p.y,p.m-1,p.d+delta);return coYmd(dt.getFullYear(),dt.getMonth()+1,dt.getDate());}
function coColorHex(k){return ({'c-vintage':'#f0a58c','c-sky':'#a9c7e8','c-plum':'#e8a9c7','c-forest':'#a9d8c0','c-bronze':'#ee9447','c-sage':'#f5d028'}[k]||k||'#ccc');}
function coTextColor(h){if(!h||h[0]!=='#')return '#3a2418';const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return (0.299*r+0.587*g+0.114*b)/255>0.62?'#3a2418':'#fff';}
const CO_LOGO_IMG='';
const CO_COVER_IMG_CHARS='';
const CO_COVER_IMG_CLEAN='';
const CO_COVERS=[{key:'chars',name:'캐릭터 표지',img:''},{key:'clean',name:'클래식 표지',img:''}];

function coLunar(y,m,d){
  try{ if(window.Solar){ const l=window.Solar.fromYmd(y,m,d).getLunar(); return `음 ${l.getMonth()}.${l.getDay()}`; } }catch(e){}
  return '';
}

function coDayMap(month){
  const byDay={};
  // 이 달에 표시할 이벤트 모으기 (원본 순서 유지 — 휴무 등 실제 순서 반영)
  const items=Object.values(_coSelectedEvents);
  // 레인 배정: 기간일정(여러 날)을 먼저 배치해 같은 레인을 모든 날에서 공유 → 가로 연결
  const ranges=[], singles=[];
  items.forEach(ev=>{
    if(ev.yearly){
      const p=coParseYmd(ev.startYmd);
      if(p.m===month) singles.push({ev,d:p.d,seg:'single'});
      return;
    }
    // 이 달 구간 추출
    let cur=ev.startYmd, days=[];
    while(cur<=ev.endYmd){
      const p=coParseYmd(cur);
      if(p.m===month&&p.y===_coYear) days.push({d:p.d,ymd:cur});
      if(cur===ev.endYmd)break;
      cur=coAddDay(cur,1);
    }
    if(days.length===0)return;
    if(days.length===1 && ev.startYmd===ev.endYmd) singles.push({ev,d:days[0].d,seg:'single'});
    else ranges.push({ev,days});
  });
  // 레인 그리드: lanes[day] = [ev또는null,...]
  const laneOf={}; // 막대를 day별로 lane index에 넣기
  function setLane(day,lane,obj){ (byDay[day]=byDay[day]||[]); byDay[day][lane]=obj; }
  let usedLanes=0;
  // 1) 기간일정 먼저 (각자 빈 레인 하나 차지, 전 구간 동일 레인)
  ranges.forEach(r=>{
    // 이 구간 전체에서 비어있는 최소 레인 찾기
    let lane=0;
    for(;;lane++){ let ok=true; r.days.forEach(x=>{ if(byDay[x.d]&&byDay[x.d][lane])ok=false; }); if(ok)break; }
    r.days.forEach((x,i)=>{
      const isStart=(x.ymd===r.ev.startYmd), isEnd=(x.ymd===r.ev.endYmd);
      const seg=isStart?'start':(isEnd?'end':'mid');
      setLane(x.d,lane,{title:r.ev.title,color:r.ev.color,seg});
    });
    if(lane+1>usedLanes)usedLanes=lane+1;
  });
  // 2) 단일/매년 — 빈 레인에 순서대로
  singles.forEach(s=>{
    let lane=0;
    while(byDay[s.d]&&byDay[s.d][lane])lane++;
    setLane(s.d,lane,{title:s.ev.title,color:s.ev.color,seg:'single'});
  });
  // null 구멍을 빈 막대로 메워 정렬 유지
  Object.keys(byDay).forEach(d=>{
    const arr=byDay[d];
    for(let i=0;i<arr.length;i++){ if(!arr[i])arr[i]={title:'',color:'transparent',seg:'gap'}; }
  });
  return byDay;
}

function coBuildMonth(month, W){
  const H=W*2/3;
  const c=v=>Math.round(v*W);
  const accent='#8b3a2a', gold='#b08a50', text='#3d2a21', line='rgba(139,58,42,.12)';
  const sun='#b24c3c', sat='#5a6e96', lunC='#a8967d', paper='#f8f0e0';
  const first=new Date(_coYear,month-1,1).getDay();
  const dim=new Date(_coYear,month,0).getDate();
  const byDay=coDayMap(month);
  const fz=v=>Math.max(7,c(v));
  let cells=''; let day=1;
  const rows=Math.ceil((first+dim)/7);
  // 한 셀에 들어갈 최대 막대 수(줄 높이 통일용)
  let maxBars=1;
  for(let d=1;d<=dim;d++){ const n=(byDay[d]||[]).length; if(n>maxBars)maxBars=n; }
  const barH=c(.024), barGap=c(.004), dayH=c(.052);
  const bodyH=maxBars*barH+(maxBars>0?(maxBars-1)*barGap:0);
  const cellH=dayH+bodyH+c(.01);
  for(let r=0;r<rows;r++){
    cells+='<tr>';
    for(let cc=0;cc<7;cc++){
      const idx=r*7+cc;
      if(idx<first||day>dim){cells+=`<td style="border-top:1px solid ${line};height:${cellH}px"></td>`;continue;}
      const hol=CO_HOLIDAYS[month+'-'+day];
      const col=(cc===0||hol)?sun:(cc===6?sat:text);
      const lun=coLunar(_coYear,month,day);
      // 막대 영역: 셀 폭 전체를 채워 좌우 이웃과 연결되도록 음수 마진 사용
      let bars='';
      (byDay[day]||[]).forEach(ev=>{
        if(ev.seg==='gap'){ bars+=`<div style="height:${barH}px;margin:0 0 ${barGap}px 0"></div>`; return; }
        const hx=coColorHex(ev.color), tc=coTextColor(hx);
        const rl=c(.005);
        const tl=(ev.seg==='single'||ev.seg==='start')?rl:0;
        const tr=(ev.seg==='single'||ev.seg==='end')?rl:0;
        const showT=(ev.seg==='single'||ev.seg==='start');
        const ml=(ev.seg==='mid'||ev.seg==='end')?(-c(.012)-2)+'px':'0';
        const mr=(ev.seg==='mid'||ev.seg==='start')?(-c(.012)-2)+'px':'0';
        bars+=`<div style="height:${barH}px;font-size:${fz(.019)}px;font-weight:600;padding:0 ${c(.006)}px;border-radius:${tl}px ${tr}px ${tr}px ${tl}px;color:${tc};background:${hx};line-height:${barH}px;margin:0 ${mr} ${barGap}px ${ml};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${showT?escapeHtml(ev.title):'&nbsp;'}</div>`;
      });
      cells+=`<td style="border-top:1px solid ${line};vertical-align:top;height:${cellH}px;padding:0">
        <div style="height:${dayH}px;padding:${c(.005)}px ${c(.006)}px 0;box-sizing:border-box;white-space:nowrap;overflow:hidden;line-height:1.05">
          <span style="font-family:var(--ff-serif);font-weight:600;color:${col};font-size:${fz(.03)}px">${day}</span><span style="font-size:${fz(.014)}px;color:${lunC};margin-left:2px">${lun}</span>${hol?`<span style="font-size:${fz(.014)}px;color:${sun};margin-left:3px">${hol}</span>`:''}
        </div>
        <div style="padding:0">${bars}</div>
      </td>`;
      day++;
    }
    cells+='</tr>';
  }
  const th=(t,cl)=>`<th style="font-size:${fz(.026)}px;font-weight:700;color:${cl||'#78604b'};padding:${c(.008)}px 0">${t}</th>`;
  return `
  <div style="width:${W}px;min-height:${H}px;background:${paper};border-radius:${c(.012)}px;position:relative;box-sizing:border-box;border:${Math.max(2,c(.004))}px solid ${accent};box-shadow:inset 0 0 0 ${c(.006)}px ${paper},inset 0 0 0 ${c(.007)}px ${accent};padding:${c(.035)}px">
      <div style="display:flex;align-items:flex-start;gap:${c(.03)}px">
        <div style="font-family:var(--ff-serif);font-weight:800;color:${accent};font-size:${c(.13)}px;line-height:.9">${month}</div>
        <div style="flex:1;padding-top:${c(.015)}px">
          <div style="font-family:var(--ff-serif);font-weight:600;color:${text};font-size:${c(.05)}px;line-height:1">${CO_MONTH_EN[month]}</div>
          <div style="color:${gold};font-size:${c(.03)}px;margin-top:${c(.02)}px;font-weight:600">${_coYear} · ${CO_MONTH_KR[month]}</div>
        </div>
        <img src="${CO_LOGO_IMG}" style="width:${c(.11)}px;height:${c(.11)}px;object-fit:contain">
      </div>
      <div style="height:2px;background:${gold};margin:${c(.025)}px ${c(.01)}px ${c(.02)}px"></div>
      <table style="width:100%;border-collapse:collapse;table-layout:fixed">
        <thead><tr>${th('일',sun)}${th('월')}${th('화')}${th('수')}${th('목')}${th('금')}${th('토',sat)}</tr></thead>
        <tbody>${cells}</tbody>
      </table>
  </div>`;
}

function coBuildBackPage(month, W){
  const H=W*2/3;
  const c=v=>Math.round(v*W);
  const accent='#8b3a2a', gold='#b08a50', text='#3d2a21', line='rgba(139,58,42,.18)';
  const sun='#b24c3c', sat='#5a6e96', paper='#f8f0e0';
  const fz=v=>Math.max(6,c(v));
  const nm=month<12?month+1:1, ny=month<12?_coYear:_coYear+1;
  // 다음달 미니 그리드
  const first=new Date(ny,nm-1,1).getDay(), dim=new Date(ny,nm,0).getDate();
  let mini=''; let d=1; const rows=Math.ceil((first+dim)/7);
  for(let r=0;r<rows;r++){ mini+='<tr>'; for(let cc=0;cc<7;cc++){ const idx=r*7+cc;
    if(idx<first||d>dim){mini+='<td></td>';continue;}
    const hol=CO_HOLIDAYS[nm+'-'+d]&&ny===_coYear;
    const col=(cc===0||hol)?sun:(cc===6?sat:text);
    mini+=`<td style="text-align:center;font-family:var(--ff-serif);font-size:${fz(.025)}px;color:${col};padding:${c(.004)}px 0">${d}</td>`; d++;
  } mini+='</tr>'; }
  const mth=(t,cl)=>`<th style="font-size:${fz(.02)}px;font-weight:700;color:${cl||'#78604b'};padding:${c(.004)}px 0">${t}</th>`;
  // 메모 점선
  let memo=''; const lines=7;
  for(let i=0;i<lines;i++) memo+=`<div style="border-bottom:1px dotted ${line};height:${c(.07)}px"></div>`;
  const quote=(CO_QUOTES[month]||'').split('\n').map(q=>`<div>${escapeHtml(q)}</div>`).join('');
  return `
  <div style="width:${W}px;min-height:${H}px;background:${paper};border-radius:${c(.012)}px;position:relative;box-sizing:border-box;border:${Math.max(2,c(.004))}px solid ${accent};box-shadow:inset 0 0 0 ${c(.006)}px ${paper},inset 0 0 0 ${c(.007)}px ${accent};padding:${c(.04)}px">
      <div style="font-family:var(--ff-serif);font-weight:800;color:${accent};font-size:${c(.06)}px">${month}월의 기록</div>
      <div style="color:${gold};font-size:${c(.024)}px;margin-top:${c(.01)}px;font-weight:600">MEMO · ${CO_MONTH_EN[month]} ${_coYear}</div>
      <div style="height:2px;background:${gold};margin:${c(.02)}px 0 ${c(.025)}px"></div>
      <div style="display:flex;gap:${c(.04)}px">
        <div style="flex:1.3">${memo}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:baseline;gap:${c(.015)}px">
            <span style="font-family:var(--ff-serif);font-weight:800;color:${accent};font-size:${c(.06)}px;line-height:.9">${nm}</span>
            <div><div style="font-family:var(--ff-serif);color:${text};font-size:${c(.03)}px">${CO_MONTH_EN[nm]}</div>
            <div style="color:${gold};font-size:${fz(.02)}px">다음 달 미리보기</div></div>
          </div>
          <table style="width:100%;border-collapse:collapse;table-layout:fixed;margin-top:${c(.02)}px">
            <thead><tr>${mth('일',sun)}${mth('월')}${mth('화')}${mth('수')}${mth('목')}${mth('금')}${mth('토',sat)}</tr></thead>
            <tbody>${mini}</tbody>
          </table>
          <div style="border-top:1px solid ${line};margin-top:${c(.02)}px;padding-top:${c(.02)}px;font-family:var(--ff-serif);font-style:italic;color:${text};font-size:${fz(.026)}px;line-height:1.5">
            <span style="color:${gold};font-size:${c(.05)}px;font-weight:800">“</span>${quote}
          </div>
        </div>
      </div>
      <img src="${CO_LOGO_IMG}" style="position:absolute;right:${c(.04)}px;bottom:${c(.04)}px;width:${c(.09)}px;height:${c(.09)}px;object-fit:contain;opacity:.85">
  </div>`;
}

let _m=6, _side='front';
function render(){
  const W=Math.min(700, document.querySelector('.wrap').clientWidth-24);
  const cal=document.getElementById('cal');
  cal.innerHTML=(_side==='front')?coBuildMonth(_m,W):coBuildBackPage(_m,W);
  document.getElementById('mLbl').textContent=_m+'월';
  document.getElementById('yLbl').textContent=_coYear+'년 '+_m+'월 ('+(_side==='front'?'앞면':'뒷면')+')';
}
document.getElementById('prevM').onclick=()=>{_m=_m>1?_m-1:12;render();};
document.getElementById('nextM').onclick=()=>{_m=_m<12?_m+1:1;render();};
document.getElementById('sideFront').onclick=()=>{_side='front';document.getElementById('sideFront').classList.add('on');document.getElementById('sideBack').classList.remove('on');render();};
document.getElementById('sideBack').onclick=()=>{_side='back';document.getElementById('sideBack').classList.add('on');document.getElementById('sideFront').classList.remove('on');render();};
window.addEventListener('resize',render);
window.addEventListener('load',render);
render();
</script>
</body></html>
