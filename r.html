<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#f3e6cf">
<title>우리 캘린더로 이동 중</title>

<meta property="og:type" content="website">
<meta property="og:site_name" content="우리 캘린더">
<meta property="og:title" content="우리 캘린더 · 방 초대">
<meta property="og:description" content="함께 일정을 나누는 공간으로 초대해요">
<meta property="og:image" content="https://first-uri-calender.vercel.app/icon-512.png">
<meta property="og:locale" content="ko_KR">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{background:#f3e6cf;color:#2a1c0f;font-family:-apple-system,system-ui,'Noto Sans KR',sans-serif;margin:0;padding:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.stamp{width:64px;height:64px;border:2px solid #8b3a2a;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:24px;position:relative;background:#fbf2e0}
.stamp::before{content:'';position:absolute;inset:4px;border:1px solid #8b3a2a;border-radius:50%;pointer-events:none}
.stamp-text{font-family:'Noto Serif KR',serif;font-size:10px;font-weight:700;color:#8b3a2a;letter-spacing:.6px;line-height:1.2;text-align:center}
.title{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:700;color:#2a1c0f;margin-bottom:8px;letter-spacing:.4px;text-align:center}
.sub{font-size:13px;color:#8a6c52;line-height:1.6;margin-bottom:24px;text-align:center;max-width:300px}
.spinner{width:26px;height:26px;border:2px solid rgba(139,58,42,.18);border-top-color:#8b3a2a;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.actions{display:none;flex-direction:column;gap:10px;margin-top:8px;width:100%;max-width:280px}
.actions.on{display:flex}
.btn{padding:14px 18px;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;text-align:center;letter-spacing:.2px}
.btn-primary{background:#8b3a2a;color:#fbf2e0}
.btn-primary:active{opacity:.85}
.btn-secondary{background:transparent;color:#8b3a2a;border:1px solid rgba(139,58,42,.35)}
.btn-secondary:active{background:rgba(139,58,42,.06)}
.hint{font-size:11px;color:#b8a285;margin-top:18px;line-height:1.55;max-width:280px;text-align:center}
.hint.on{display:block}
.hint{display:none}
</style>
</head>
<body>

<div class="stamp">
  <span class="stamp-text">우리<br>캘린더</span>
</div>
<div class="title">우리 캘린더로 이동 중</div>
<div class="sub" id="sub">잠시만 기다려주세요</div>
<div class="spinner" id="spinner"></div>

<div class="actions" id="actions">
  <a class="btn btn-primary" id="openBtn" href="#">앱으로 열기</a>
  <a class="btn btn-secondary" id="webBtn" href="#">브라우저에서 보기</a>
</div>

<div class="hint" id="hint">자동 이동이 안 되면 위 버튼을 눌러주세요</div>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var joinCode = (params.get('join') || params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);

  var ua = (navigator.userAgent || '').toLowerCase();
  var isAndroid = /android/.test(ua);
  var isIOS = /iphone|ipad|ipod/.test(ua);
  var isInApp = /kakaotalk|naver\(inapp|fb_iab|fban|fbav|instagram|line\//.test(ua);

  var host = 'first-uri-calender.vercel.app';
  var path = joinCode ? '/?join='+joinCode : '/';
  var httpsUrl = 'https://' + host + path;

  document.getElementById('webBtn').href = httpsUrl;

  function showActions(){
    document.getElementById('actions').classList.add('on');
    document.getElementById('hint').classList.add('on');
    document.getElementById('spinner').style.display='none';
  }

  function tryOpenIntent(intentUrl){
    try {
      var a = document.createElement('a');
      a.href = intentUrl;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
    } catch(e) {
      try { location.href = intentUrl; } catch(e2){}
    }
  }

  if (isAndroid) {
    var pkg = 'app.vercel.first_uri_calender.twa';
    var fallback = encodeURIComponent(httpsUrl);
    var intentUrl = 'intent://' + host + path
      + '#Intent;scheme=https;package=' + pkg
      + ';action=android.intent.action.VIEW'
      + ';category=android.intent.category.BROWSABLE'
      + ';S.browser_fallback_url=' + fallback + ';end';

    var openBtn = document.getElementById('openBtn');
    openBtn.href = intentUrl;

    // 사용자가 큰 버튼을 누른 것과 동일하게 anchor click 트리거 (location.href보다 카톡 가로채기 덜 당함)
    setTimeout(function(){ tryOpenIntent(intentUrl); }, 100);

    // 0.6초 후엔 버튼을 즉시 노출 — 자동 redirect가 막혀도 사용자가 바로 누를 수 있게
    setTimeout(function(){
      showActions();
      if (isInApp) {
        document.getElementById('sub').textContent = '아래 "앱으로 열기"를 눌러주세요';
      }
    }, 600);

    // 1.8초 후에도 페이지가 떠있으면 카톡이 가로챈 거 — 외부 브라우저 안내
    setTimeout(function(){
      if (isInApp) {
        document.getElementById('sub').innerHTML = '카톡이 차단하고 있어요.<br>우측 위 메뉴 → Chrome에서 열기를 눌러주세요';
      }
    }, 1800);

  } else if (isIOS) {
    document.getElementById('openBtn').href = httpsUrl;
    document.getElementById('openBtn').textContent = '계속 진행';

    setTimeout(function(){
      location.href = httpsUrl;
    }, 80);

    setTimeout(function(){
      showActions();
      if (isInApp) {
        document.getElementById('sub').innerHTML = '카톡 우측 위 <b>⋯</b> 메뉴에서<br>Safari에서 열기를 눌러주세요';
      }
    }, 1500);

  } else {
    location.href = httpsUrl;
  }
})();
</script>

</body>
</html>
