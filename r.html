<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<meta name="supported-color-schemes" content="light">

<style>
:root{--cream:#f3e6cf;--paper:#fbf3e2;--ink:#2a1c0f;--terra:#8b3a2a;--terra-deep:#6e2c1f;--gold:#c9a04e;--muted:#8a6c52;--line:rgba(139,58,42,.22);--shadow:rgba(60,35,15,.14)}
*{box-sizing:border-box;margin:0;padding:0}
html{color-scheme:only light !important;forced-color-adjust:none !important}
body{background:var(--cream);color:var(--ink);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;color-scheme:only light !important;forced-color-adjust:none !important;-webkit-font-smoothing:antialiased}
.stamp{width:88px;height:88px;border:2.5px solid var(--terra);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:var(--paper);margin-bottom:22px;box-shadow:0 6px 18px var(--shadow)}
.stamp::before{content:'';position:absolute;inset:6px;border:1px solid var(--terra);border-radius:50%}
.stamp .o{font-family:'Playfair Display',serif;font-weight:700;font-size:22px;color:var(--terra);line-height:1;letter-spacing:1px}
.stamp .c{font-family:'Playfair Display',serif;font-size:7px;font-weight:700;color:var(--terra);letter-spacing:1.5px;margin-top:3px}
.title{font-family:'Hahmlet','Gowun Batang',serif;font-weight:700;font-size:20px;color:var(--ink);margin-bottom:6px;letter-spacing:-.3px}
.sub{font-size:13px;color:var(--muted);margin-bottom:30px}
.step{font-family:'Hahmlet','Gowun Batang',serif;font-weight:700;font-size:17px;color:var(--terra);margin-bottom:14px}
.code-box{display:inline-flex;align-items:center;gap:12px;background:#fff7e8;border:2px solid var(--gold);border-radius:14px;padding:15px 24px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px var(--shadow);margin-bottom:8px}
.code-box:active{transform:scale(.97)}
.code-box .hash{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);font-weight:600}
.code-box .code{font-family:'Playfair Display',serif;font-size:23px;font-weight:600;letter-spacing:2px;color:var(--ink)}
.code-box .cp{width:21px;height:21px;color:var(--terra)}
.copied{font-size:12.5px;color:var(--terra);font-weight:700;height:18px;margin-bottom:30px;opacity:0;transition:opacity .2s}
.copied.on{opacity:1}
.step2{font-family:'Hahmlet','Gowun Batang',serif;font-weight:700;font-size:17px;color:var(--ink);margin-bottom:18px}
.badges{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;margin:0 auto}
.badge{display:inline-flex;align-items:center;justify-content:center;gap:11px;background:var(--ink);color:var(--paper);padding:13px 20px;border-radius:13px;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 16px var(--shadow);text-decoration:none}
.badge:active{transform:scale(.98)}
.badge svg{width:26px;height:26px;flex:none}
.badge .bt{display:flex;flex-direction:column;line-height:1.18;text-align:left}
.badge .bt small{font-size:10px;opacity:.78}
.badge .bt span{font-size:16px;font-weight:700}
.open-app{margin-top:22px;font-size:13px;color:var(--muted);text-decoration:underline;text-underline-offset:3px}
.foot{margin-top:40px;font-size:11px;color:#b39b7c;line-height:1.6}
.foot a{color:var(--terra)}
</style>
</head>
<body>
<div class="stamp"><span class="o">OUR</span><span class="c">CALENDAR</span></div>
<div class="title">우리 캘린더에 초대받았어요</div>
<div class="sub">함께 일정을 나누는 공간으로의 초대예요</div>
<div class="step">초대 코드를 복사하고</div>
<div class="code-box" id="codeBox" onclick="copyCode()">
  <span class="hash">#</span>
  <span class="code" id="codeText">------</span>
  <svg class="cp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
</div>
<div class="copied" id="copied">코드를 복사했어요!</div>
<div class="step2">앱 설치 후 입력해주세요</div>

  <a class="badge" href="https://apps.apple.com/app/id6773996160" target="_blank" rel="noopener">

    <span class="bt"><small>다운로드</small><span>App Store</span></span>
  </a>

    <svg viewBox="0 0 24 24"><path fill="#34A853" d="M3.6 21.2 13 12.4 15.6 15 5.2 21.4c-.6.3-1.2.1-1.6-.2z"/><path fill="#EA4335" d="M3.6 2.8c0-.3.4-.5.9-.5l11.1 6.4-2.6 2.5z"/><path fill="#FBBC04" d="m16.9 9.1 3.4 1.9c.9.5.9 1.5 0 2L16.8 15 14 12z"/><path fill="#4285F4" d="M3.6 2.8 13 11.6 3.6 21.2c-.1-.2-.1-.4-.1-.6V3.4c0-.2 0-.4.1-.6z"/></svg>

</div>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var code = (params.get('join') || params.get('code') || '').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
  if(code){
    document.getElementById('codeText').textContent = code;
  } else {
    document.getElementById('codeText').textContent = '코드없음';
  }
  window._code = code;
})();
function copyCode(){
  var code = window._code; if(!code) return;
  var done = function(){ var el=document.getElementById('copied'); el.classList.add('on'); setTimeout(function(){el.classList.remove('on');},2000); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(done).catch(function(){ fallbackCopy(code); done(); });
  } else { fallbackCopy(code); done(); }
}
function fallbackCopy(text){
  try{ var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }catch(e){}
}
</script>
</body>
